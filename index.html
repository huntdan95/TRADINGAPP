    const ALL_LESSONS = [
      // ── BEGINNER: Foundations ──
      { icon:"\uD83C\uDF31", title:"What is the Stock Market?", level:"beginner", cat:"Foundations", content:"The stock market is a marketplace where shares of publicly traded companies are bought and sold. When you buy a share, you own a tiny piece of that company. The price of a share is determined by supply and demand \u2014 if more people want to buy than sell, the price goes up, and vice versa.\n\nKey exchanges include the NYSE (New York Stock Exchange) and NASDAQ. Companies list their shares through an IPO (Initial Public Offering). The market operates Monday\u2013Friday, 9:30 AM \u2013 4:00 PM Eastern Time. Pre-market trading runs 4:00\u20139:30 AM, and after-hours trading runs 4:00\u20138:00 PM.\n\nMarket Indexes like the S&P 500, Dow Jones, and NASDAQ Composite track the overall performance of groups of stocks. The S&P 500, for example, includes 500 of the largest US companies and is often used as a benchmark for the entire market." },
      { icon:"\uD83D\uDCB0", title:"Types of Orders", level:"beginner", cat:"Foundations", content:"Market Order: Buys/sells immediately at the best available price. Fastest execution, but the price you get may differ from the price you see (called slippage), especially in fast-moving stocks or low-volume names.\n\nLimit Order: You set the maximum price you'll pay (buy) or minimum you'll accept (sell). Guarantees your price or better, but the order might never fill if the market doesn't reach your level. Great for entries where you want a specific price.\n\nStop-Loss Order: Triggers a market order when the stock hits a specific price. If you set a stop-loss at $95 on a $100 stock, it auto-sells if the price drops to $95. Essential for managing downside risk, but in a flash crash the fill price could be much lower.\n\nStop-Limit Order: Like a stop-loss but triggers a limit order instead of a market order. More control, but risk of not filling in a fast drop.\n\nTrailing Stop: A dynamic stop-loss that moves with the stock price. If you set a 5% trailing stop, and the stock rises from $100 to $120, your stop moves to $114. If it then drops 5%, you sell at $114 instead of riding it all the way down." },
      { icon:"\u26A0\uFE0F", title:"Pattern Day Trader Rule (PDT)", level:"beginner", cat:"Foundations", content:"The PDT rule is a FINRA regulation. If you make 4 or more day trades (buy and sell the same security on the same day) within 5 business days in a margin account, you're flagged as a Pattern Day Trader.\n\nOnce flagged, you must maintain at least $25,000 in your account to continue day trading. If your equity drops below $25k, you'll be restricted to closing trades only for 90 days.\n\nStrategies to manage the PDT rule:\n\n1. Use a cash account instead of margin \u2014 no PDT rule applies, but you must wait for trades to settle (T+1 for stocks) before reusing that cash.\n\n2. Hold positions overnight \u2014 this technically isn't a day trade.\n\n3. Trade options or futures \u2014 different rules may apply.\n\n4. Use multiple brokerage accounts to spread day trades across them.\n\n5. Keep your account above $25k at all times if you plan to actively day trade." },
      { icon:"\uD83C\uDFE6", title:"Brokerage Accounts Explained", level:"beginner", cat:"Foundations", content:"Cash Account: You can only trade with the money you deposit. No borrowing. No PDT rule, but settled funds take T+1 (one business day) to clear. Best for swing traders and beginners.\n\nMargin Account: The broker lends you money to trade. You can buy stocks worth up to 2x your cash (4x for day trading). More buying power, but losses are amplified and you pay interest on borrowed funds. The PDT rule applies here.\n\nIRA (Individual Retirement Account): Tax-advantaged account for long-term investing. Traditional IRA gives a tax deduction now, pay taxes on withdrawal. Roth IRA: no deduction now, but all gains are tax-free on withdrawal. Limited to $7,000/year contribution (2024 limit).\n\nPaper Trading Account: Virtual money, real market data. Zero risk. This is what PaperTrader provides! Use it to test strategies before committing real capital." },
      { icon:"\uD83D\uDCC5", title:"How to Read a Stock Quote", level:"beginner", cat:"Foundations", content:"When you look at a stock, you'll see several key data points:\n\nBid: The highest price a buyer is willing to pay right now.\nAsk: The lowest price a seller is willing to accept right now.\nSpread: The difference between bid and ask. Tighter spreads mean more liquidity.\n\nOpen: The price at the start of the trading day.\nHigh/Low: The highest and lowest prices reached during the day.\nClose: The final price when the market closes (or the current price during trading hours).\nPrevious Close: Yesterday's closing price. Today's percentage change is calculated from this.\n\nVolume: How many shares have traded today. Higher volume = more interest and tighter spreads.\n\n52-Week High/Low: The highest and lowest prices over the past year. Stocks near 52-week highs may have momentum; stocks near lows may be value plays or falling knives.\n\nMarket Cap: Share price x total shares outstanding. Classifies companies as Mega ($200B+), Large ($10B-200B), Mid ($2B-10B), Small ($300M-2B), or Micro (<$300M)." },
      { icon:"\uD83D\uDCCB", title:"Building Your First Trading Plan", level:"beginner", cat:"Foundations", content:"A trading plan is a written set of rules that defines how, when, and why you trade. Without one, you're gambling.\n\nYour plan should cover:\n\n1. Goals: What are you trying to achieve? Income? Growth? Learning? Be specific: 'I want to grow my account 20% this year while limiting drawdowns to 10%.'\n\n2. Markets & Instruments: Which stocks will you trade? Tech only? S&P 500 stocks? Small caps? ETFs? Stick to what you know.\n\n3. Timeframe: Are you day trading (minutes to hours), swing trading (days to weeks), or position trading (weeks to months)?\n\n4. Entry Rules: Exactly what conditions must be met to enter a trade. Example: 'Stock breaks above 20-day high on volume 50% above average.'\n\n5. Exit Rules: When do you take profit? When do you cut losses? Define both before entering. Example: 'Take profit at 2:1 reward:risk. Stop-loss at 7% below entry.'\n\n6. Position Sizing: How much of your account goes into each trade? The 1-2% risk rule is standard.\n\n7. Trading Journal: Log every trade with your reasoning, entry/exit, and what you learned. Review weekly." },

      // ── BEGINNER: Day Trading Basics ──
      { icon:"\u23F0", title:"What is Day Trading?", level:"beginner", cat:"Day Trading", content:"Day trading means opening and closing positions within the same trading day. By the market close at 4 PM ET, a day trader holds no overnight positions. The goal is to profit from short-term price movements.\n\nDay trading is NOT investing. Investors buy and hold for months or years based on company fundamentals. Day traders profit from volatility and price action over minutes or hours.\n\nWhy people day trade: No overnight risk (news or earnings surprises can't hurt you), potential for daily income, exciting and engaging.\n\nWhy most people fail at day trading: It requires intense focus and discipline, transaction costs add up fast, the PDT rule requires $25k minimum, emotional control is extremely difficult, and statistically 70-90% of day traders lose money in their first year.\n\nThe key insight: Day trading is a skill that takes 6-12 months of daily practice to develop. Paper trading is the place to build that skill before risking real money." },
      { icon:"\uD83D\uDCF1", title:"Day Trading Tools & Setup", level:"beginner", cat:"Day Trading", content:"Essential tools for day trading:\n\n1. A Fast Broker: You need a broker with quick execution, low/no commissions, and a good platform. Look for direct market access (DMA) and hotkey support.\n\n2. Charting Software: Real-time charts with candlestick patterns, multiple timeframes, and technical indicators. TradingView, Thinkorswim, and DAS Trader are popular choices.\n\n3. Level 2 / Order Book: Shows all pending buy and sell orders at different prices. This reveals where supply and demand are concentrated and helps predict short-term moves.\n\n4. Stock Screener: Filters stocks by criteria like volume, price range, percent change, and float. You need to find stocks that are moving.\n\n5. News Feed: Real-time news is critical for momentum trading. Earnings, FDA approvals, analyst upgrades \u2014 news drives the biggest moves.\n\n6. Hardware: A reliable internet connection (wired, not WiFi) and at least two monitors so you can watch charts and your order entry simultaneously.\n\n7. Trading Journal: A spreadsheet or app where you log every trade. Date, ticker, entry, exit, P&L, setup type, and what you learned." },
      { icon:"\uD83C\uDFAF", title:"Pre-Market Routine for Day Traders", level:"beginner", cat:"Day Trading", content:"A consistent pre-market routine separates profitable day traders from the rest. Start 30-60 minutes before the 9:30 AM open.\n\n1. Check the Overnight Futures: S&P 500 futures (ES) tell you if the overall market will likely open up or down. If futures are -1.5%, expect a bearish open.\n\n2. Scan for Gappers: Use a scanner to find stocks gapping up or down more than 3-5% on high pre-market volume. These are your candidates. Focus on stocks with a clear catalyst (earnings, news, FDA decision).\n\n3. Build Your Watchlist: Pick 3-5 stocks max. Too many = scattered attention. For each, identify key support/resistance levels on the daily chart.\n\n4. Check the Economic Calendar: Major events like Federal Reserve decisions, jobs reports (NFP), CPI data, or earnings from mega-cap companies (AAPL, NVDA, etc.) can move the entire market.\n\n5. Review Yesterday's Trades: Spend 5 minutes on what went right and wrong. Avoid repeating mistakes.\n\n6. Set Your Mental State: You need to be calm, focused, and willing to follow your plan. If you're emotional, tired, or distracted, it's better to sit out. The market will be there tomorrow." },

      // ── INTERMEDIATE: Strategy ──
      { icon:"\uD83D\uDEE1\uFE0F", title:"Risk Management Deep Dive", level:"intermediate", cat:"Risk Management", content:"Risk management is the single most important skill in trading. You can have a mediocre strategy and still be profitable with excellent risk management.\n\nThe 1% Rule: Never risk more than 1% of your total account on a single trade. With a $100k account, your max loss per trade is $1,000. This means you can be wrong 10+ times in a row and still be in the game.\n\nPosition Sizing Formula: Shares = Risk Amount / (Entry Price - Stop Price). Example: Account $100k, risk 1% = $1,000. Stock entry at $50, stop-loss at $48 (risk $2/share). Shares = $1,000 / $2 = 500 shares.\n\nDaily Loss Limit: Set a max daily loss (e.g., 3% of account = $3,000). If you hit it, stop trading for the day. This prevents revenge trading spirals.\n\nCorrelation Risk: If you're long 5 tech stocks, you really only have one position. A tech sector drop hits all of them. Diversify across sectors.\n\nRisk/Reward Ratio: Only take trades where the potential reward is at least 2x the risk. If your stop is $2 away, your target should be at least $4 away. At 2:1, you only need to win 34% of the time to break even.\n\nMax Drawdown Plan: Decide in advance what total account drawdown forces you to stop and re-evaluate. A 20% drawdown means you need a 25% gain just to get back to even." },
      { icon:"\uD83D\uDCC8", title:"Technical Analysis: Chart Patterns", level:"intermediate", cat:"Technical Analysis", content:"Chart patterns form when price action creates recognizable shapes. They predict the likely direction of the next move.\n\nContinuation Patterns (trend continues):\n\nBull Flag: Stock makes a strong move up (the pole), then pulls back slightly in a parallel channel (the flag). Breakout above the flag = continuation higher. This is one of the most reliable day trading patterns.\n\nBear Flag: Opposite of bull flag. Sharp drop, small bounce in a channel, then breakdown continues.\n\nTriangle (Ascending/Descending/Symmetrical): Price compresses into a tighter range. Breakout direction depends on the triangle type and overall trend.\n\nReversal Patterns (trend changes):\n\nHead & Shoulders: Three peaks where the middle is highest. The neckline connects the two troughs. Break below the neckline = reversal from up to down.\n\nDouble Top/Bottom: Price hits the same level twice and reverses. Double top = bearish, double bottom = bullish.\n\nCup & Handle: U-shaped recovery followed by a small pullback. Breakout above the handle = strong bullish continuation.\n\nThe key with all patterns: Wait for confirmation (the breakout) before entering. Many patterns fail, and entering early means taking unnecessary risk." },
      { icon:"\uD83D\uDD6F\uFE0F", title:"Candlestick Patterns Every Trader Must Know", level:"intermediate", cat:"Technical Analysis", content:"Candlestick patterns reveal the battle between buyers and sellers within a single bar.\n\nAnatomy of a Candle: The body shows open-to-close range. Wicks (shadows) show the high and low. Green/white = close above open (bullish). Red/black = close below open (bearish).\n\nSingle-Candle Patterns:\n\nDoji: Open and close are nearly equal, forming a cross. Shows indecision. After a strong trend, a doji can signal reversal.\n\nHammer: Small body at the top, long lower wick (2x+ body length). Found at the bottom of a downtrend = bullish reversal. Buyers fought back from the low.\n\nShooting Star: Small body at the bottom, long upper wick. Found at the top of an uptrend = bearish reversal.\n\nMarubozu: All body, no wicks. Strong conviction in one direction.\n\nMulti-Candle Patterns:\n\nEngulfing: A candle whose body completely covers the previous candle's body. Bullish engulfing at a low = reversal up. Bearish engulfing at a high = reversal down.\n\nMorning Star: Three-candle bullish reversal. Big red candle, small indecision candle (doji/spinning top), big green candle.\n\nEvening Star: Opposite of morning star. Bearish reversal at the top.\n\nThree White Soldiers / Three Black Crows: Three consecutive strong candles in the same direction. Powerful trend continuation signal.\n\nAlways use candle patterns in context. A hammer at a major support level is far more meaningful than a random hammer in the middle of nowhere." },
      { icon:"\uD83D\uDCC9", title:"Support, Resistance & Key Levels", level:"intermediate", cat:"Technical Analysis", content:"Support and resistance are the foundation of all technical analysis. They represent price levels where buying or selling pressure concentrates.\n\nSupport: A price level where demand is strong enough to prevent further decline. Think of it as a floor. When price approaches support, buyers step in.\n\nResistance: A price level where selling pressure prevents further advance. Think of it as a ceiling. When price approaches resistance, sellers emerge.\n\nWhy Levels Work: Institutional traders place large orders at key levels. Algorithms are programmed to buy/sell at these zones. Human psychology causes traders to remember round numbers and previous highs/lows.\n\nTypes of Key Levels:\n\n1. Previous Day's High/Low/Close (PDH/PDL/PDC): Critical for day traders. These are levels every professional watches.\n\n2. VWAP (Volume Weighted Average Price): The average price weighted by volume. Institutional benchmark. Price above VWAP = bullish, below = bearish.\n\n3. Moving Averages: The 9, 20, 50, and 200-period MAs act as dynamic support/resistance.\n\n4. Round Numbers: $50, $100, $200. Psychological levels where orders cluster.\n\n5. Pre-Market High/Low: Important for the opening 30 minutes.\n\nThe Role Reversal Principle: When support breaks, it becomes resistance. When resistance breaks, it becomes support. This is one of the most reliable concepts in trading." },
      { icon:"\uD83E\uDDE0", title:"Trading Psychology: Mastering Your Mind", level:"intermediate", cat:"Psychology", content:"Your biggest enemy in trading is yourself. Every trader battles the same psychological traps.\n\nFOMO (Fear Of Missing Out): You see a stock running +15% and chase it at the top. The cure: know that there are always more setups tomorrow. If you missed it, you missed it.\n\nLoss Aversion: Studies show people feel losses 2.5x more intensely than equivalent gains. This leads to holding losers (hoping for recovery) and cutting winners too early (locking in gains). The cure: set stops before entering and follow them mechanically.\n\nRevenge Trading: After a loss, you take an aggressive trade to 'make it back.' This almost always leads to bigger losses. The cure: daily loss limit. Walk away when you hit it.\n\nOverconfidence: A winning streak makes you feel invincible. You increase size, skip your rules, and eventually give it all back. The cure: same position size, same rules, every single trade.\n\nAnalysis Paralysis: Too many indicators, too many watchlist stocks, too much news. You're afraid to pull the trigger. The cure: simplify. One or two setups, 3-5 stocks, 2-3 indicators max.\n\nThe Tilt: A poker term for emotional decision-making after frustration. Once tilted, everything goes wrong because you're reactive, not analytical. The cure: recognize it early and stop trading immediately. Go for a walk.\n\nKeeping a trading journal is the most powerful psychological tool. Write your emotional state before and after every trade. Patterns will emerge that help you recognize and manage your triggers." },
      { icon:"\uD83D\uDCCA", title:"Volume Analysis & Price Action", level:"intermediate", cat:"Technical Analysis", content:"Volume is the number of shares traded in a given period. It's the fuel behind price moves.\n\nHigh Volume + Price Up = Bullish. Strong buying conviction. The move is more likely to continue.\nHigh Volume + Price Down = Bearish. Strong selling conviction.\nLow Volume + Price Up = Weak rally. Likely to reverse. Buyers aren't committed.\nLow Volume + Price Down = Weak selloff. Could reverse. Sellers aren't committed.\n\nVolume Spikes: A sudden volume surge (3-5x average) signals a significant event \u2014 usually institutional activity, news, or a breakout. Pay close attention.\n\nVWAP (Volume Weighted Average Price): Calculated as cumulative (price x volume) / cumulative volume throughout the day. Institutional traders use VWAP as a benchmark. If they need to buy a large position, they want to buy below VWAP (good execution). Day traders use VWAP as a directional bias: price above VWAP = look for longs, below = look for shorts.\n\nOn-Balance Volume (OBV): A running total that adds volume on up days and subtracts on down days. If price is flat but OBV is rising, smart money is accumulating. Divergences between OBV and price often precede big moves.\n\nRelative Volume (RVOL): Today's volume compared to the average. RVOL of 3.0 means the stock is trading 3x its normal volume. Day traders filter for stocks with RVOL > 2.0 because these have the most movement and tightest spreads." },

      // ── INTERMEDIATE: Day Trading Setups ──
      { icon:"\uD83D\uDE80", title:"Day Trading Setup: Opening Range Breakout", level:"intermediate", cat:"Day Trading", content:"The Opening Range Breakout (ORB) is one of the most popular and beginner-friendly day trading strategies.\n\nThe Concept: The first 5-30 minutes of trading establishes the 'opening range' \u2014 the high and low of that period. You then trade the breakout in either direction.\n\nHow to Trade the 15-Minute ORB:\n\n1. Wait for the first 15 minutes after the open (9:30-9:45 AM). Mark the high and low of this range.\n\n2. If price breaks above the range high on increasing volume, go long. Set stop-loss below the range low.\n\n3. If price breaks below the range low on increasing volume, go short. Set stop-loss above the range high.\n\n4. Target: 1.5x to 2x the range width, or the next major support/resistance level.\n\nWhy it Works: The first 15-30 minutes is when overnight orders are filled and institutions establish their positions. The range captures this initial battle, and the breakout often sets the tone for the rest of the day.\n\nFilters for Better Results: Trade in the direction of the pre-market trend. Require volume to be at least 1.5x average on the breakout candle. Avoid trading ORB on days with major economic announcements in the first hour. Works best on stocks with a clear catalyst (earnings, news)." },
      { icon:"\uD83C\uDFF4", title:"Day Trading Setup: Bull & Bear Flags", level:"intermediate", cat:"Day Trading", content:"Flags are the bread and butter of momentum day trading. They represent a brief pause in a strong trend before continuation.\n\nBull Flag: A stock surges sharply higher (the pole), then consolidates in a slight downward or sideways channel (the flag). The consolidation typically retraces 20-40% of the pole on declining volume.\n\nEntry: Buy when price breaks above the top of the flag channel with increasing volume.\nStop: Below the bottom of the flag.\nTarget: The length of the pole, projected from the breakout point.\n\nBear Flag: The mirror image. A sharp drop, then a slight upward consolidation. Short the breakdown.\n\nWhy Flags Work: The initial surge attracts attention. The consolidation allows early buyers to take profits while new buyers wait. When buying pressure resumes, the stock makes another leg up.\n\nMultiple Flags: Strong momentum stocks can form 2-3 flags in a day (Flag 1, Flag 2, Flag 3). Flag 1 is usually the strongest and safest. Each subsequent flag has a higher failure rate as the move gets extended.\n\nCommon Mistakes: Entering during the flag (before the breakout), setting stops too tight (give it room), and trading flag patterns in choppy/range-bound markets where they're less reliable." },
      { icon:"\uD83D\uDD04", title:"Day Trading Setup: VWAP Bounce & Reversal", level:"intermediate", cat:"Day Trading", content:"VWAP (Volume Weighted Average Price) is the most important indicator for day traders. It resets daily and shows the true average price.\n\nVWAP Bounce (Trend Continuation):\n\nIn an uptrend, price often pulls back to VWAP and bounces. This is your entry.\n\n1. Wait for a stock trending above VWAP to pull back and touch or come near VWAP.\n2. Look for a bullish candle (hammer, engulfing) at VWAP on the 1-minute or 5-minute chart.\n3. Enter long with a stop just below VWAP.\n4. Target: previous high or new high of day.\n\nVWAP Reversal (Mean Reversion):\n\nWhen a stock is extended far from VWAP (2+ ATR away), it often reverts back to VWAP.\n\n1. Find a stock that has moved sharply away from VWAP on big volume.\n2. Wait for momentum to stall (volume declining, candles getting smaller).\n3. Enter in the direction of VWAP with a stop beyond the extreme.\n4. Target: VWAP itself (partial or full position).\n\nVWAP Rejection (Trend Confirmation):\n\nA stock below VWAP that bounces up TO VWAP but gets rejected (fails to hold above) confirms the downtrend. This is a short entry.\n\nKey Rule: Never go long below VWAP or short above VWAP unless you have a very strong reason. VWAP acts as a bias filter for the entire day." },

      // ── ADVANCED: Strategy ──
      { icon:"\uD83D\uDCC5", title:"Advanced Day Trading Strategies", level:"advanced", cat:"Day Trading", content:"Scalping: Making dozens of trades per day for small profits ($0.05-$0.30 per share). Requires lightning-fast execution, very tight spreads, high volume stocks, and absolute discipline. Risk per trade is tiny, but profits compound through volume. Best for experienced traders with direct market access.\n\nMomentum Ignition: Finding the exact moment a stock breaks out of a consolidation on massive volume. You ride the first explosive leg. Key is getting in within the first few seconds of the breakout. Requires hotkeys and pre-set orders.\n\nGap & Go: When a stock gaps up 5%+ on news or earnings with heavy pre-market volume, you buy the first pullback after the open and ride the continuation. Works because shorts are trapped and need to cover, adding fuel to the rally.\n\nShort Squeeze: When a heavily-shorted stock (short interest > 20%) starts rising, shorts are forced to buy to cover losses, pushing the price even higher in a feedback loop. Day traders can ride these explosive moves, but they're extremely volatile.\n\nPair Trading: Going long one stock and short a correlated stock simultaneously. Example: Long AMD, Short Intel. You profit from the relative movement between them, not the market direction. Lower risk but requires understanding correlations.\n\nNews Catalyst Trading: Trading the reaction to breaking news (earnings beats/misses, FDA approvals, analyst upgrades). The first 5 minutes after news breaks offers the most opportunity, but also the most risk. Pre-plan your reaction to different scenarios." },
      { icon:"\uD83D\uDCCA", title:"Reading Financial Statements", level:"advanced", cat:"Fundamentals", content:"Income Statement: Revenue, expenses, and profit. Look for consistent revenue growth and improving margins. EPS (Earnings Per Share) is the most-watched metric. Revenue growth > 15% year-over-year is strong. Declining revenue is a red flag even if profits are up (may be from cost cutting, not growth).\n\nBalance Sheet: Assets, liabilities, and equity. Check the debt-to-equity ratio \u2014 above 2.0 is high leverage. Current ratio (current assets / current liabilities) should be > 1.5 for financial health. Cash on hand matters in downturns.\n\nCash Flow Statement: How cash actually moves in and out. Free Cash Flow (FCF) = Operating Cash Flow - Capital Expenditures. FCF is arguably the most important metric because it's harder to manipulate than earnings. Companies can report profit while burning cash.\n\nKey Ratios:\nP/E Ratio: Price / Earnings. Compare to industry average and the company's historical range.\nPEG Ratio: P/E / Growth Rate. Below 1.0 = potentially undervalued.\nP/S Ratio: Price / Revenue. Useful for unprofitable growth companies.\nROE: Return on Equity. Above 15% is strong.\nDebt/EBITDA: Below 3.0 is healthy.\n\nEarnings Season: Quarterly earnings reports move stocks dramatically. An earnings beat with raised guidance = bullish. A beat with lowered guidance = bearish. The market cares more about the future (guidance) than the past (reported numbers)." },
      { icon:"\u2696\uFE0F", title:"Options Basics for Stock Traders", level:"advanced", cat:"Strategy", content:"Options give you the right (but not obligation) to buy or sell a stock at a specific price by a specific date. They're leveraged instruments that amplify both gains and losses.\n\nCall Option: Gives you the right to BUY stock at the strike price. You buy calls when you're bullish. Example: AAPL $200 Call expiring in 30 days. If AAPL goes to $220, your call gains significant value.\n\nPut Option: Gives you the right to SELL stock at the strike price. You buy puts when you're bearish or want to protect (hedge) a long position.\n\nKey Terms:\nStrike Price: The price at which you can buy/sell the stock.\nExpiration: When the option expires worthless if not exercised.\nPremium: What you pay for the option.\nIn-the-Money (ITM): Call with strike below stock price, put with strike above.\nOut-of-the-Money (OTM): The opposite. Cheaper but less likely to profit.\n\nWhy Options Matter for Day Traders: Options provide leverage (control 100 shares for a fraction of the cost), defined risk (max loss = premium paid), and the ability to profit from both up and down moves. However, options lose value over time (theta decay), so timing matters even more than with stocks.\n\nWarning: Options are complex and can result in rapid, total loss of your investment. Paper trade options for at least 3 months before using real money." },
      { icon:"\uD83C\uDF10", title:"Market Microstructure: How Markets Really Work", level:"advanced", cat:"Strategy", content:"Understanding market microstructure gives you an edge that most retail traders lack.\n\nThe Order Book (Level 2): Shows all resting limit orders at each price level. The bid side shows buyers, the ask side shows sellers. Large orders at a price level (support/resistance) can act as magnets or walls.\n\nMarket Makers: Firms that provide liquidity by continuously placing buy and sell orders. They profit from the bid-ask spread. They must buy when you sell and sell when you buy. Understanding their behavior helps predict short-term moves.\n\nDark Pools: Private exchanges where large institutional orders are executed anonymously. About 40% of US equity volume trades in dark pools. These orders don't show up on Level 2, which is why large moves can seem to come from nowhere.\n\nHigh-Frequency Trading (HFT): Algorithms that trade in microseconds. They account for 50%+ of market volume. They exploit tiny inefficiencies, provide liquidity, and can front-run your orders if you're not careful.\n\nOrder Flow: The actual buying and selling pressure in real-time. Tools like Time & Sales (tape reading) show every trade as it happens. Large prints (10,000+ shares) at the ask = aggressive buying. At the bid = aggressive selling.\n\nPayment for Order Flow (PFOF): Most commission-free brokers sell your order flow to market makers. This means your market orders might get slightly worse prices. Use limit orders to protect yourself." },
      { icon:"\uD83D\uDCB9", title:"Building a Day Trading Business", level:"advanced", cat:"Strategy", content:"Treating trading as a business separates professionals from gamblers.\n\nCapital Requirements: Minimum $25k for PDT compliance. Recommended: $30-50k so a losing streak doesn't drop you below $25k. Never trade with money you can't afford to lose.\n\nRealistic Expectations: A good day trader aims for 0.5-1% return per day on their account. That's $250-$500 on a $50k account. Sounds small, but compounded over 250 trading days, that's 125-250% annually. Most traders don't achieve this consistently for years.\n\nTax Implications: Day trading profits are taxed as short-term capital gains (your regular income tax rate, up to 37%). Consider electing Trader Tax Status (TTS) with the IRS for deductions. Mark-to-market (Section 475) election eliminates the wash sale rule. Consult a tax professional.\n\nRecord Keeping: Track every trade, every expense (software, data feeds, hardware, education), and every deposit/withdrawal. This is essential for taxes and performance review.\n\nThe Learning Curve: Expect 6-12 months of paper trading, then 6-12 months of small-size live trading before consistent profitability. Most successful day traders have 2+ years of screen time before they become consistently profitable.\n\nBurnout Prevention: Day trading is mentally exhausting. Take regular breaks, exercise, maintain relationships outside of trading, and never trade all day every day. Quality of trades matters far more than quantity. Many profitable traders only trade the first 1-2 hours of the day." },
      { icon:"\uD83D\uDEA8", title:"Common Day Trading Mistakes & How to Avoid Them", level:"advanced", cat:"Day Trading", content:"Mistake 1: No Stop-Loss. 'I'll just hold and it will come back.' This is how accounts blow up. Every single trade needs a pre-defined stop.\n\nMistake 2: Oversizing. Putting 50%+ of your account in one trade because you're 'sure' it will work. It only takes one bad trade to destroy months of gains. Stick to 1-2% risk per trade.\n\nMistake 3: Trading the First 5 Minutes. The open is chaos \u2014 wide spreads, fake breakouts, and algorithmic manipulation. Unless you're an experienced scalper, wait for the first 15 minutes to pass and let the range establish.\n\nMistake 4: Averaging Down on a Day Trade. Your trade goes against you, so you buy more to lower your average. This doubles your risk on a losing position. Cut your loss and move on.\n\nMistake 5: Not Having a Watchlist. Scanning random stocks during market hours leads to impulsive trades. Do your homework pre-market.\n\nMistake 6: Ignoring the Overall Market. If the S&P 500 is tanking, most long setups will fail. Always check the overall market direction (SPY, QQQ) before taking individual trades.\n\nMistake 7: Moving Your Stop-Loss. You set a stop at $48, price drops to $48.10, and you move it to $47. Then $46. Then $45. Suddenly you've taken a loss 4x bigger than planned. Set it and forget it.\n\nMistake 8: Trading While Emotional. Angry, excited, revenge-trading, scared, overconfident \u2014 all of these states lead to poor decisions. The market doesn't care about your feelings." },
    ];

    function LearnPage() {
      const [active, setActive] = useState(null);
      const [filter, setFilter] = useState("all");

      const categories = useMemo(() => {
        const cats = [...new Set(ALL_LESSONS.map(l => l.cat))];
        return cats;
      }, []);

      const filtered = filter === "all" ? ALL_LESSONS
        : filter === "beginner" || filter === "intermediate" || filter === "advanced"
          ? ALL_LESSONS.filter(l => l.level === filter)
          : ALL_LESSONS.filter(l => l.cat === filter);

      if (active !== null) {
        const l = ALL_LESSONS[active]; // use absolute index
        return (
          <div className="page-enter lesson-detail">
            <button className="back-btn" onClick={()=>setActive(null)}>{Icon.back} Back to Lessons</button>
            <div className="card">
              <div className="card-header" style={{flexWrap:'wrap',gap:8}}>
                <h3><span style={{marginRight:10}}>{l.icon}</span>{l.title}</h3>
                <div style={{display:'flex',gap:6}}>
                  <span style={{fontSize:11,color:'var(--text-muted)',background:'var(--surface2)',padding:'3px 10px',borderRadius:20}}>{l.cat}</span>
                  <span className={`lesson-tag ${l.level}`}>{l.level}</span>
                </div>
              </div>
              <div className="card-body">{l.content.split("\n\n").map((p,i) => <p key={i}>{p}</p>)}</div>
            </div>
          </div>
        );
      }

      return (
        <div className="page-enter">
          <div className="page-header" style={{flexDirection:'column',alignItems:'flex-start'}}>
            <h2>Learn to Trade</h2>
            <p style={{color:'var(--text-dim)',fontSize:14,marginTop:4}}>{ALL_LESSONS.length} lessons from beginner to advanced</p>
          </div>

          {/* Filter chips */}
          <div style={{display:'flex',gap:6,marginBottom:24,flexWrap:'wrap'}}>
            {[["all","All"],["beginner","Beginner"],["intermediate","Intermediate"],["advanced","Advanced"]].map(([key,label]) => (
              <button key={key} className={`chart-btn ${filter===key?'active':''}`} style={{padding:'6px 16px',fontSize:13}}
                onClick={()=>setFilter(key)}>{label}{key!=="all" && ` (${ALL_LESSONS.filter(l=>key==="all"||l.level===key).length})`}</button>
            ))}
            <span style={{width:1,height:24,background:'var(--border)',margin:'0 4px',alignSelf:'center'}}/>
            {categories.map(cat => (
              <button key={cat} className={`chart-btn ${filter===cat?'active':''}`} style={{padding:'6px 14px',fontSize:12}}
                onClick={()=>setFilter(filter===cat?"all":cat)}>{cat}</button>
            ))}
          </div>

          <div className="lesson-grid">
            {filtered.map((l) => {
              const absIndex = ALL_LESSONS.indexOf(l);
              return (
                <div key={absIndex} className="lesson-card" onClick={()=>setActive(absIndex)}>
                  <span className="lesson-icon">{l.icon}</span>
                  <h3>{l.title}</h3>
                  <p>{l.content.substring(0,120)}...</p>
                  <div style={{display:'flex',gap:6,marginTop:12}}>
                    <span style={{fontSize:10,color:'var(--text-muted)',background:'var(--surface2)',padding:'3px 8px',borderRadius:20}}>{l.cat}</span>
                    <span className={`lesson-tag ${l.level}`}>{l.level}</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════
    // MAIN APP SHELL
    // ═══════════════════════════════════════════════════════
    function AppShell() {
      const { user, logout } = useContext(AuthContext);
      const [page, setPage] = useState("dashboard");
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const needsConfig = FIREBASE_CONFIG.apiKey==="YOUR_FIREBASE_API_KEY" || FINNHUB_API_KEY==="YOUR_FINNHUB_API_KEY";

      const navigate = p => { setPage(p); setSidebarOpen(false); };

      return (
        <div className="app-layout">
          {/* Mobile header */}
          <div className="mobile-header">
            <button className="hamburger" onClick={()=>setSidebarOpen(!sidebarOpen)}>{Icon.menu}</button>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <div style={{width:28,height:28,borderRadius:8,background:'var(--gradient-accent)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>{"\uD83D\uDCC8"}</div>
              <span style={{fontWeight:700,fontSize:15}}>PaperTrader</span>
            </div>
          </div>

          {/* Overlay */}
          <div className={`sidebar-overlay ${sidebarOpen?'open':''}`} onClick={()=>setSidebarOpen(false)} />

          {/* Sidebar */}
          <div className={`sidebar ${sidebarOpen?'open':''}`}>
            <div className="sidebar-brand">
              <div className="brand-row">
                <div className="brand-icon">{"\uD83D\uDCC8"}</div>
                <h2>PaperTrader</h2>
              </div>
              <div className="tagline">Learn to trade, risk-free</div>
            </div>
            <div className="sidebar-nav">
              <div className="nav-section-label">Trading</div>
              <div className={`nav-item ${page==="dashboard"?"active":""}`} onClick={()=>navigate("dashboard")}>{Icon.dashboard} Dashboard</div>
              <div className={`nav-item ${page==="portfolio"?"active":""}`} onClick={()=>navigate("portfolio")}>{Icon.portfolio} Portfolio</div>
              <div className="nav-section-label">Education</div>
              <div className={`nav-item ${page==="learn"?"active":""}`} onClick={()=>navigate("learn")}>{Icon.learn} Learn</div>
            </div>
            <div className="sidebar-footer">
              <div className="user-info">
                <div className="user-avatar">{(user.displayName||user.email||"U")[0].toUpperCase()}</div>
                <div style={{minWidth:0}}>
                  <div className="user-name">{user.displayName||"Trader"}</div>
                  <div className="user-email" style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user.email}</div>
                </div>
              </div>
              <button className="btn btn-outline btn-sm" style={{width:'100%'}} onClick={logout}>{Icon.logout} Sign Out</button>
            </div>
          </div>

          <div className="main-content">
            {needsConfig && (
              <div className="config-banner">
                <span className="banner-icon">{"\u2728"}</span>
                <span>Running in <strong>demo mode</strong> \u2014 add your Firebase & Finnhub API keys in the source to enable real data and authentication</span>
              </div>
            )}
            {page==="dashboard" && <DashboardPage />}
            {page==="portfolio" && <PortfolioPage />}
            {page==="learn" && <LearnPage />}
          </div>
        </div>
      );
    }

    function App() {
      return (
        <ToastProvider>
          <AuthProvider>
            <AuthContext.Consumer>
              {({ user }) => user ? <PortfolioProvider><AppShell /></PortfolioProvider> : <LoginPage />}
            </AuthContext.Consumer>
          </AuthProvider>
        </ToastProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
