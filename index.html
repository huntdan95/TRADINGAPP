<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PaperTrader — Learn to Trade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- React -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

  <!-- Firebase 10 (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <!-- Lightweight chart library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lightweight-charts/4.1.1/lightweight-charts.standalone.production.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0c10;
      --bg2: #0f1117;
      --surface: #141720;
      --surface2: #1c2030;
      --surface3: #242940;
      --border: #1e2235;
      --border-hover: #2e3450;
      --text: #e8eaf0;
      --text-dim: #6b7194;
      --text-muted: #4a5070;
      --accent: #6c5ce7;
      --accent2: #a29bfe;
      --accent-glow: rgba(108,92,231,.25);
      --accent-hover: #7e71ea;
      --green: #00cec9;
      --green2: #55efc4;
      --green-bg: rgba(0,206,201,.1);
      --red: #ff6b6b;
      --red2: #ff8787;
      --red-bg: rgba(255,107,107,.1);
      --yellow: #feca57;
      --yellow-bg: rgba(254,202,87,.1);
      --blue: #74b9ff;
      --blue-bg: rgba(116,185,255,.1);
      --gradient-accent: linear-gradient(135deg, #6c5ce7, #a29bfe);
      --gradient-green: linear-gradient(135deg, #00cec9, #55efc4);
      --gradient-red: linear-gradient(135deg, #ff6b6b, #ff8787);
      --shadow-sm: 0 2px 8px rgba(0,0,0,.2);
      --shadow-md: 0 4px 24px rgba(0,0,0,.3);
      --shadow-lg: 0 8px 40px rgba(0,0,0,.4);
      --shadow-glow: 0 0 30px var(--accent-glow);
      --radius: 14px;
      --radius-sm: 10px;
      --radius-lg: 20px;
      --transition: .25s cubic-bezier(.4,0,.2,1);
    }

    html { scroll-behavior: smooth; overflow-x: hidden; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
    }

    #root { min-height: 100vh; overflow-x: hidden; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

    /* ═══ AUTH PAGE ═══ */
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }
    .auth-page::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(108,92,231,.15) 0%, transparent 70%);
      top: -200px;
      right: -100px;
      animation: float 8s ease-in-out infinite;
    }
    .auth-page::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,206,201,.1) 0%, transparent 70%);
      bottom: -150px;
      left: -100px;
      animation: float 10s ease-in-out infinite reverse;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 44px;
      width: 420px;
      max-width: 92vw;
      position: relative;
      z-index: 1;
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow-lg), 0 0 60px rgba(108,92,231,.08);
      animation: cardEnter .6s cubic-bezier(.16,1,.3,1);
    }
    @media (max-width: 500px) {
      .auth-card { padding: 28px 20px; border-radius: 16px; max-width: 96vw; }
      .auth-card h1 { font-size: 22px; }
      .auth-card .subtitle { font-size: 13px; margin-bottom: 24px; }
      .auth-card .logo-icon { width: 40px; height: 40px; font-size: 20px; }
      .auth-tabs { gap: 0; }
      .auth-tab { font-size: 13px; padding: 10px 8px; }
    }
    @keyframes cardEnter {
      from { opacity: 0; transform: translateY(24px) scale(.97); }
    }
    .auth-card .logo-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .auth-card .logo-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: var(--gradient-accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 4px 16px rgba(108,92,231,.3);
    }
    .auth-card h1 { font-size: 26px; font-weight: 800; letter-spacing: -.5px; }
    .auth-card .subtitle {
      color: var(--text-dim);
      margin-bottom: 32px;
      font-size: 14px;
      line-height: 1.5;
    }

    .input-group { margin-bottom: 18px; }
    .input-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .input-group input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: all var(--transition);
    }
    .input-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .input-group input::placeholder { color: var(--text-muted); }

    /* ═══ BUTTONS ═══ */
    .btn {
      padding: 11px 22px;
      border-radius: var(--radius-sm);
      border: none;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all var(--transition);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary {
      background: var(--gradient-accent);
      color: #fff;
      width: 100%;
      box-shadow: 0 4px 16px rgba(108,92,231,.25);
    }
    .btn-primary:hover { box-shadow: 0 6px 24px rgba(108,92,231,.35); transform: translateY(-1px); }
    .btn-google {
      background: #fff;
      color: #333;
      width: 100%;
      margin-bottom: 16px;
      font-weight: 600;
      box-shadow: var(--shadow-sm);
    }
    .btn-google:hover { background: #f8f8f8; box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .btn-sm { padding: 7px 16px; font-size: 13px; border-radius: 8px; }
    .btn-success { background: var(--gradient-green); color: #000; font-weight: 700; }
    .btn-success:hover { box-shadow: 0 4px 16px rgba(0,206,201,.3); }
    .btn-danger { background: var(--gradient-red); color: #fff; }
    .btn-danger:hover { box-shadow: 0 4px 16px rgba(255,107,107,.3); }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); background: rgba(108,92,231,.05); }
    .btn-ghost { background: transparent; color: var(--text-dim); padding: 6px; }
    .btn-ghost:hover { color: var(--text); background: var(--surface2); }

    .divider {
      text-align: center;
      margin: 24px 0;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      position: relative;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 38%;
      height: 1px;
      background: var(--border);
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .auth-toggle {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-dim);
    }
    .auth-toggle a {
      color: var(--accent2);
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
    }
    .auth-toggle a:hover { text-decoration: underline; }

    /* Auth tabs */
    .auth-tabs {
      display: flex;
      gap: 4px;
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 4px;
      margin-bottom: 28px;
    }
    .auth-tab {
      flex: 1;
      padding: 10px 12px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--text-muted);
      transition: all var(--transition);
    }
    .auth-tab.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 8px rgba(108,92,231,.3);
    }
    .auth-tab:not(.active):hover { color: var(--text-dim); }

    .forgot-link {
      display: inline-block;
      font-size: 13px;
      color: var(--accent2);
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 18px;
      font-weight: 500;
      text-align: right;
      width: 100%;
    }
    .forgot-link:hover { text-decoration: underline; }

    .success-msg {
      background: var(--green-bg);
      color: var(--green);
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-bottom: 18px;
      border: 1px solid rgba(0,206,201,.15);
      line-height: 1.5;
    }

    .password-rules {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: -10px;
      margin-bottom: 18px;
      line-height: 1.5;
    }
    .password-rules .rule {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
    }
    .password-rules .rule.pass { color: var(--green); }
    .password-rules .rule.fail { color: var(--text-muted); }

    .auth-back-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      color: var(--text-dim);
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      padding: 4px 0;
      margin-bottom: 16px;
      transition: color var(--transition);
    }
    .auth-back-btn:hover { color: var(--text); }
    .auth-back-btn svg { width: 14px; height: 14px; }

    .error-msg {
      background: var(--red-bg);
      color: var(--red);
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-bottom: 18px;
      border: 1px solid rgba(255,107,107,.15);
      animation: shake .4s;
    }
    @keyframes shake {
      10%,90% { transform: translateX(-1px); }
      20%,80% { transform: translateX(2px); }
      30%,50%,70% { transform: translateX(-3px); }
      40%,60% { transform: translateX(3px); }
    }

    /* ═══ APP LAYOUT ═══ */
    .app-layout { display: flex; min-height: 100vh; }

    .sidebar {
      width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 0;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 50;
      transition: transform var(--transition);
    }

    .sidebar-brand {
      padding: 24px 24px 20px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-brand .brand-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .sidebar-brand .brand-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: var(--gradient-accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 2px 12px rgba(108,92,231,.3);
    }
    .sidebar-brand h2 { font-size: 17px; font-weight: 800; letter-spacing: -.3px; }
    .sidebar-brand .tagline {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
      padding-left: 50px;
    }

    .sidebar-nav { flex: 1; padding: 12px 0; }
    .nav-section-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 16px 24px 8px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 24px;
      margin: 2px 12px;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all var(--transition);
      border-radius: var(--radius-sm);
      position: relative;
    }
    .nav-item:hover { color: var(--text); background: var(--surface2); }
    .nav-item.active {
      color: #fff;
      background: var(--gradient-accent);
      box-shadow: 0 2px 12px rgba(108,92,231,.3);
    }
    .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      padding: 8px;
      border-radius: var(--radius-sm);
      transition: background var(--transition);
    }
    .user-info:hover { background: var(--surface2); }
    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--gradient-accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }
    .user-name { font-size: 13px; font-weight: 600; }
    .user-email { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

    .main-content {
      flex: 1;
      margin-left: 260px;
      padding: 28px 32px;
      overflow-y: auto;
      min-height: 100vh;
      background: var(--bg);
    }

    /* Mobile */
    .mobile-header {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      z-index: 40;
      padding: 0 16px;
      align-items: center;
      gap: 12px;
    }
    .hamburger {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--text);
    }
    .hamburger:hover { background: var(--surface2); }
    .hamburger svg { width: 20px; height: 20px; }
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 45;
      backdrop-filter: blur(4px);
    }

    @media (max-width: 860px) {
      .mobile-header { display: flex; }
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay.open { display: block; }
      .main-content { margin-left: 0; padding: 68px 14px 24px; }
      .content-grid { grid-template-columns: 1fr !important; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .page-header { flex-direction: column; align-items: flex-start !important; gap: 12px; }
      .page-header .search-wrapper { width: 100% !important; }
      .card-header { padding: 14px 16px; flex-wrap: wrap; gap: 8px; }
      .card-body { padding: 16px; }
      .chart-toolbar { flex-direction: column; gap: 8px; }
      .chart-controls { flex-wrap: wrap; }
      #chart-container { height: 280px; }
      .trade-form { padding: 16px; }
      .trade-input { width: 110px; }
      .positions-table th, .positions-table td { padding: 10px 8px; font-size: 12px; }
      .edu-popup { margin: 12px; max-width: calc(100vw - 24px); }
      .edu-popup-header { padding: 16px 18px; }
      .edu-popup-body { padding: 16px 18px; }
      .edu-popup-footer { padding: 14px 18px; flex-direction: column; gap: 12px; }
      .toast-container { left: 12px; right: 12px; top: 12px; }
      .toast { min-width: unset; width: 100%; }
      .lesson-grid { grid-template-columns: 1fr; }
      .history-item { flex-direction: column; align-items: flex-start; gap: 6px; }
    }
    @media (max-width: 500px) {
      .stats-grid { grid-template-columns: 1fr; gap: 8px; }
      .stat-card { padding: 16px; }
      .stat-value { font-size: 22px; }
      .stat-label { font-size: 10px; }
      .main-content { padding: 64px 10px 20px; }
      .card-header h3 { font-size: 13px; }
      .page-header h2 { font-size: 20px; }
      .search-box input { font-size: 16px; padding: 12px 16px 12px 42px; }
      .trade-row { font-size: 13px; }
      .trade-input { font-size: 16px; width: 100px; }
      .watchlist-item { padding: 12px 2px; }
      .watchlist-avatar { width: 32px; height: 32px; font-size: 10px; }
      .watchlist-ticker { font-size: 13px; }
      .watchlist-price .price { font-size: 13px; }
      .watchlist-price .change { font-size: 11px; }
      .btn { font-size: 13px; padding: 10px 16px; }
      .btn-sm { padding: 7px 12px; font-size: 12px; }
      .positions-table { font-size: 11px; }
      .positions-table th { font-size: 9px; padding: 8px 6px; }
      .positions-table td { padding: 8px 6px; font-size: 11px; }
      .ticker-badge { width: 26px; height: 26px; font-size: 9px; }
      .pnl-badge { font-size: 11px; padding: 2px 6px; }
      .lesson-card { padding: 20px; }
      .lesson-card h3 { font-size: 14px; }
      .lesson-card p { font-size: 12px; }
      .edu-popup-footer { align-items: stretch; }
      .edu-popup-footer > div:last-child { display: flex; gap: 8px; }
      .edu-popup-footer > div:last-child .btn { flex: 1; }
    }
    /* Prevent iOS zoom on input focus */
    @media (max-width: 860px) {
      input[type="text"], input[type="email"], input[type="password"], input[type="number"], input[type="search"] {
        font-size: 16px !important;
      }
    }

    /* ═══ PAGE TRANSITIONS ═══ */
    .page-enter {
      animation: pageIn .35s cubic-bezier(.16,1,.3,1);
    }
    @keyframes pageIn {
      from { opacity: 0; transform: translateY(12px); }
    }

    /* ═══ DASHBOARD ═══ */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .page-header h2 {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -.5px;
    }
    .page-header .search-wrapper { width: 380px; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      transition: all var(--transition);
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      opacity: 0;
      transition: opacity var(--transition);
    }
    .stat-card:hover { border-color: var(--border-hover); transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .stat-card:hover::before { opacity: 1; }
    .stat-card:nth-child(1)::before { background: var(--gradient-accent); }
    .stat-card:nth-child(2)::before { background: var(--gradient-green); }
    .stat-card:nth-child(3)::before { background: linear-gradient(135deg, #74b9ff, #a29bfe); }
    .stat-card:nth-child(4)::before { background: linear-gradient(135deg, #feca57, #ff6b6b); }
    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .8px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .stat-value { font-size: 26px; font-weight: 800; letter-spacing: -.5px; }
    .stat-change {
      font-size: 13px;
      margin-top: 6px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 6px;
    }
    .stat-change.up { color: var(--green); background: var(--green-bg); }
    .stat-change.down { color: var(--red); background: var(--red-bg); }

    .content-grid {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 20px;
    }
    @media (max-width: 1200px) and (min-width: 861px) {
      .content-grid { grid-template-columns: 1fr 340px; }
    }

    /* ═══ CARDS ═══ */
    .card {
      background: var(--surface);

        const url = `https://finnhub.io/api/v1/stock/candle?symbol=${symbol}&resolution=${resolution}&from=${from}&to=${to}&token=${apiKey}`;
        console.log(`[PaperTrader] Candle request: ${symbol} ${resolution}`);
        const res = await fetch(url);
        const data = await res.json();
        console.log(`[PaperTrader] Candle response status: ${data.s}, points: ${data.t?.length || 0}`);
        if (data.s !== "ok" || !data.t) return [];
        return data.t.map((t,i) => ({ time:t, open:data.o[i], high:data.h[i], low:data.l[i], close:data.c[i], volume:data.v?.[i]||0 }));

    }

    function ToastProvider({ children }) {
      const [toasts, setToasts] = useState([]);
      const addToast = useCallback((msg, type = "info") => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, msg, type }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000);
      }, []);
      return (
        <ToastContext.Provider value={addToast}>
          {children}
          <div className="toast-container">
            {toasts.map(t => (
              <div key={t.id} className={`toast ${t.type}`}>
                <span>{t.type==="success"?"\u2705":t.type==="error"?"\u274C":t.type==="warning"?"\u26A0\uFE0F":"\u2139\uFE0F"}</span>
                <span>{t.msg}</span>
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );

    // ═══════════════════════════════════════════════════════
    // PORTFOLIO PROVIDER
    // ═══════════════════════════════════════════════════════
    function PortfolioProvider({ children }) {
      const { user } = useContext(AuthContext);
      const [portfolio, setPortfolio] = useState(null);
      const [history, setHistory] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => { if (user) loadPortfolio(); }, [user]);

      const loadPortfolio = () => {
        const saved = localStorage.getItem(`portfolio_${user.uid}`);
        if (saved) { const d = JSON.parse(saved); setPortfolio(d.portfolio); setHistory(d.history||[]); }
        else { setPortfolio({ cash: STARTING_CASH, positions: {} }); setHistory([]); }
        setLoading(false);
      };
      const save = (p, h) => localStorage.setItem(`portfolio_${user.uid}`, JSON.stringify({ portfolio:p, history:h }));

      const executeTrade = (symbol, shares, price, side) => {
        setPortfolio(prev => {
          const next = { ...prev, positions: { ...prev.positions } };
          if (side === "buy") {
            next.cash -= shares*price;
            const ex = next.positions[symbol];
            if (ex) { const ts = ex.shares+shares; next.positions[symbol] = { shares:ts, avgCost:(ex.avgCost*ex.shares+price*shares)/ts, currentPrice:price }; }
            else { next.positions[symbol] = { shares, avgCost:price, currentPrice:price }; }
          } else {
            const ex = next.positions[symbol];
            if (ex) { next.cash += shares*price; const rem = ex.shares-shares; if (rem<=0) delete next.positions[symbol]; else next.positions[symbol] = { ...ex, shares:rem, currentPrice:price }; }
          }
          const newH = [...history, { symbol, shares, price, side, timestamp: Date.now() }];
          setHistory(newH);
          save(next, newH);
          return next;
        });
      };

      const updatePrice = (symbol, price) => {
        setPortfolio(prev => {
          if (!prev.positions[symbol]) return prev;
          const next = { ...prev, positions: { ...prev.positions } };
          next.positions[symbol] = { ...next.positions[symbol], currentPrice: price };
          return next;
        });
      };

      const resetPortfolio = () => { const p = { cash:STARTING_CASH, positions:{} }; setPortfolio(p); setHistory([]); save(p,[]); };

      if (loading) return null;
      return <PortfolioContext.Provider value={{ portfolio, history, executeTrade, updatePrice, resetPortfolio }}>{children}</PortfolioContext.Provider>;
    }

      const { loginEmail, signupEmail, loginGoogle, resetPassword } = useContext(AuthContext);
      // Views: "login", "signup", "forgot", "reset-sent"
      const [view, setView] = useState("login");
      const [email, setEmail] = useState("");

      const [displayName, setDisplayName] = useState("");
      const [error, setError] = useState("");

      const clearForm = () => { setEmail(""); setPassword(""); setConfirmPassword(""); setDisplayName(""); setError(""); };
      const goTo = (v) => { clearForm(); setView(v); };

      const pwLength = password.length >= 6;
      const pwMatch = password === confirmPassword && confirmPassword.length > 0;

      const handleLogin = async (e) => {
        e.preventDefault(); setError(""); setLoading(true);
        try { await loginEmail(email, password); }
        catch (err) {
          const code = err.code || "";
          if (code === "auth/user-not-found") setError("No account found with this email. Sign up instead?");
          else if (code === "auth/wrong-password" || code === "auth/invalid-credential") setError("Incorrect password. Try again or reset it.");
          else if (code === "auth/invalid-email") setError("Please enter a valid email address.");
          else if (code === "auth/too-many-requests") setError("Too many attempts. Please wait a moment and try again.");
          else setError(err.message || "Sign in failed. Please try again.");
        }
        setLoading(false);
      };

      const handleSignup = async (e) => {
        e.preventDefault(); setError("");
        if (!pwLength) return setError("Password must be at least 6 characters.");
        if (!pwMatch) return setError("Passwords do not match.");
        setLoading(true);
        try { await signupEmail(email, password, displayName || null); }
        catch (err) {
          const code = err.code || "";
          if (code === "auth/email-already-in-use") setError("An account with this email already exists. Try signing in.");
          else if (code === "auth/invalid-email") setError("Please enter a valid email address.");
          else if (code === "auth/weak-password") setError("Password is too weak. Use at least 6 characters.");
          else setError(err.message || "Account creation failed. Please try again.");
        }
        setLoading(false);
      };

      const handleForgot = async (e) => {
        e.preventDefault(); setError(""); setLoading(true);

          const code = err.code || "";
          if (code === "auth/user-not-found") setError("No account found with this email.");
          else if (code === "auth/invalid-email") setError("Please enter a valid email address.");
          else if (code === "auth/too-many-requests") setError("Too many requests. Please wait a moment.");
          else setError(err.message || "Failed to send reset email. Please try again.");

        setLoading(false);
      };

                <a onClick={()=>goTo("forgot")}>Try a different email</a>

    // STOCK CHART
    // ═══════════════════════════════════════════════════════
    function StockChart({ symbol }) {
      const chartRef = useRef(null);
      const chartInstance = useRef(null);
      const observerRef = useRef(null);
      const [resolution, setResolution] = useState("D");
      const [showIndicator, setShowIndicator] = useState(null);
      const [loading, setLoading] = useState(false);
      const [chartError, setChartError] = useState(null);

      useEffect(() => {
        if (!chartRef.current || !symbol) return;
        // Wait for next frame so the container has layout dimensions
        const raf = requestAnimationFrame(() => {
          // Double-RAF to guarantee paint
          requestAnimationFrame(() => loadChart());
        });
        return () => {
          cancelAnimationFrame(raf);
          if (observerRef.current) { observerRef.current.disconnect(); observerRef.current = null; }
          if (chartInstance.current) { try { chartInstance.current.remove(); } catch(e){} chartInstance.current = null; }
        };
      }, [symbol, resolution]);

      const loadChart = async () => {
        setLoading(true);
        setChartError(null);
        try {
          // Clean up previous
          if (observerRef.current) { observerRef.current.disconnect(); observerRef.current = null; }
          if (chartInstance.current) { try { chartInstance.current.remove(); } catch(e){} chartInstance.current = null; }

          const container = chartRef.current;
          if (!container) { setLoading(false); return; }

          // Ensure container has width
          let w = container.clientWidth;
          if (w <= 0) {
            // Fallback: use parent width or a reasonable default
            w = container.parentElement?.clientWidth || 600;
          }
          const h = window.innerWidth <= 500 ? 260 : (window.innerWidth <= 860 ? 300 : 380);

          const chart = LightweightCharts.createChart(container, {
            width: w, height: h,
            layout: { background: { type:'solid', color:'#141720' }, textColor:'#6b7194', fontFamily:'Inter' },
            grid: { vertLines: { color:'#1e2235' }, horzLines: { color:'#1e2235' } },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal, vertLine: { color:'rgba(108,92,231,.4)' }, horzLine: { color:'rgba(108,92,231,.4)' } },
            rightPriceScale: { borderColor:'#1e2235' },
            timeScale: { borderColor:'#1e2235', timeVisible: resolution!=="D"&&resolution!=="W" },
          });
          chartInstance.current = chart;

          console.log(`[PaperTrader] Fetching candles for ${symbol} (${resolution})...`);
          const candles = await getCandles(symbol, resolution);
          console.log(`[PaperTrader] Got ${candles.length} candles for ${symbol}`);

          if (candles.length > 0) {
            // Convert Unix timestamps to YYYY-MM-DD for daily/weekly (more reliable in LightweightCharts v4)
            const formatTime = (t) => {
              if (resolution === "D" || resolution === "W" || resolution === "M") {
                const d = new Date(t * 1000);
                return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
              }
              return t; // keep Unix timestamp for intraday
            };

            const cs = chart.addCandlestickSeries({ upColor:'#00cec9', downColor:'#ff6b6b', borderUpColor:'#00cec9', borderDownColor:'#ff6b6b', wickUpColor:'#00cec9', wickDownColor:'#ff6b6b' });
            cs.setData(candles.map(c => ({ time: formatTime(c.time), open:c.open, high:c.high, low:c.low, close:c.close })));

            if (candles.length >= 20) {
              const sma = [];
              for (let i=19;i<candles.length;i++) { const s = candles.slice(i-19,i+1).reduce((a,c)=>a+c.close,0); sma.push({ time: formatTime(candles[i].time), value:s/20 }); }
              chart.addLineSeries({ color:'#a29bfe', lineWidth:1.5, crosshairMarkerVisible:false }).setData(sma);
            }

            const vol = chart.addHistogramSeries({ priceFormat:{type:'volume'}, priceScaleId:'' });
            chart.priceScale('').applyOptions({ scaleMargins:{ top:.82, bottom:0 }});
            vol.setData(candles.map(c => ({ time: formatTime(c.time), value:c.volume, color:c.close>=c.open?'rgba(0,206,201,.2)':'rgba(255,107,107,.2)' })));
          } else {
            setChartError("No chart data available" + (resolution !== "D" ? ". Try switching to Daily (D) — intraday data requires a premium Finnhub plan." : " for this symbol."));
          }

          chart.timeScale().fitContent();

          // Resize observer with cleanup ref
          const ro = new ResizeObserver(() => {
            if (chartInstance.current && container.clientWidth > 0) {
              chartInstance.current.applyOptions({ width: container.clientWidth });
            }
          });
          ro.observe(container);
          observerRef.current = ro;

        } catch (err) {
          console.error("[PaperTrader] Chart error:", err);
          setChartError("Failed to load chart. Please try again.");
        }
        setLoading(false);
      };

      return (
        <div>
          <div className="chart-toolbar">
            <div className="chart-controls">
              {["D","W","5","15","60"].map(r => (
                <button key={r} className={`chart-btn ${resolution===r?'active':''}`} onClick={()=>setResolution(r)}>{r==="60"?"1H":r}</button>
              ))}
            </div>
            <div className="chart-controls">
              {[["rsi","RSI"],["macd","MACD"],["ma","MA"],["vol","VOL"]].map(([k,label]) => (
                <button key={k} className="chart-btn-indicator" onClick={()=>setShowIndicator(k)}>{label}</button>
              ))}
            </div>
          </div>
          <div style={{position:'relative'}}>
            <div ref={chartRef} style={{width:'100%',minHeight:window.innerWidth<=500?260:window.innerWidth<=860?300:380}} />
            {loading && <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(20,23,32,.6)'}}><div className="spinner" style={{width:28,height:28}}/></div>}
            {chartError && !loading && <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(20,23,32,.85)',borderRadius:10}}><div style={{textAlign:'center',padding:20}}><div style={{fontSize:32,marginBottom:8}}>{"\uD83D\uDCC9"}</div><div style={{color:'var(--text-dim)',fontSize:13,maxWidth:280}}>{chartError}</div></div></div>}
          </div>
          {showIndicator && <IndicatorPopup indicator={showIndicator} onClose={()=>setShowIndicator(null)} />}
        </div>
      );
    }

    // SEARCH BAR
    // ═══════════════════════════════════════════════════════
    function SearchBar({ onSelect }) {
      const [query, setQuery] = useState("");
      const [results, setResults] = useState([]);
      const [show, setShow] = useState(false);
      const timeout = useRef(null);
      const handleChange = val => {
        setQuery(val);
        clearTimeout(timeout.current);
        if (val.length < 1) { setResults([]); setShow(false); return; }
        timeout.current = setTimeout(async () => { const r = await searchSymbols(val); setResults(r); setShow(r.length > 0); }, 300);
      };
      return (
        <div className="search-box">
          <svg className="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input placeholder="Search stocks (e.g. AAPL, TSLA)..." value={query} onChange={e=>handleChange(e.target.value)} onFocus={()=>results.length&&setShow(true)} onBlur={()=>setTimeout(()=>setShow(false),200)} />
          {show && <div className="search-results">{results.map(r => (
            <div key={r.symbol} className="search-result-item" onClick={()=>{onSelect(r.symbol,r.description);setQuery("");setShow(false)}}>
              <div><span className="symbol">{r.symbol}</span><div className="name">{r.description}</div></div>
              <span className="result-arrow">{"\u203A"}</span>

    }

    // ═══════════════════════════════════════════════════════
    // TRADE PANEL
    // ═══════════════════════════════════════════════════════
    function TradePanel({ symbol, quote }) {
      const { portfolio, history, executeTrade } = useContext(PortfolioContext);
      const addToast = useContext(ToastContext);
      const [side, setSide] = useState("buy");
      const [shares, setShares] = useState("");
      const [eduPopup, setEduPopup] = useState(null);
      const [pendingTrade, setPendingTrade] = useState(null);

      if (!symbol || !quote) return (
        <div className="card">
          <div className="card-header"><h3>Trade</h3></div>
          <div className="card-body">
            <div className="empty-state">
              <span className="empty-icon">{"\uD83D\uDD0D"}</span>
              <h4>No Stock Selected</h4>
              <p>Search for a stock or pick one from your watchlist to start trading</p>
            </div>
          </div>
        </div>
      );
      const price = quote.c || 0;
      const numShares = parseInt(shares) || 0;
      const total = numShares * price;
      const position = portfolio.positions[symbol];
      const maxBuy = Math.floor(portfolio.cash / price);
      const maxSell = position?.shares || 0;

      const handleTrade = () => {
        if (numShares <= 0) return addToast("Enter a valid number of shares", "error");
        if (side === "buy" && total > portfolio.cash) return addToast("Insufficient funds", "error");
        if (side === "sell" && numShares > maxSell) return addToast("You don't own enough shares", "error");
        const trade = { symbol, shares: numShares, price, side };
        const rules = checkEducationalRules(portfolio, trade, history, quote);
        if (rules.length > 0) { setEduPopup(rules[0]); setPendingTrade(trade); return; }
        finalize(trade);
      };
      const finalize = t => {
        executeTrade(t.symbol, t.shares, t.price, t.side);
        addToast(`${t.side==="buy"?"Bought":"Sold"} ${t.shares} shares of ${t.symbol} at ${fmt(t.price)}`, "success");
        setShares(""); setEduPopup(null); setPendingTrade(null);
      };
      const setMax = () => setShares(String(side==="buy"?maxBuy:maxSell));

      return (
        <div className="card">
          <div className="trade-tabs">
            <button className={`trade-tab ${side==="buy"?"active-buy":""}`} onClick={()=>setSide("buy")}>Buy</button>
            <button className={`trade-tab ${side==="sell"?"active-sell":""}`} onClick={()=>setSide("sell")}>Sell</button>
          </div>
          <div className="trade-form">
            <div className="trade-row"><label>Symbol</label><strong style={{fontSize:16}}>{symbol}</strong></div>
            <div className="trade-row"><label>Market Price</label><span style={{fontWeight:700,fontSize:16}}>{fmt(price)}</span></div>
            <div className="trade-row"><label>Shares</label><input className="trade-input" type="number" min="1" max={side==="buy"?maxBuy:maxSell} value={shares} onChange={e=>setShares(e.target.value)} placeholder="0" /></div>
            <div className="trade-max">Max: <span onClick={setMax}>{side==="buy"?maxBuy:maxSell} shares</span></div>
            <div className="trade-summary">
              <div className="trade-summary-row"><span>Estimated Total</span><span>{fmt(total)}</span></div>
              <div className="trade-summary-row"><span>Cash Available</span><span>{fmt(portfolio.cash)}</span></div>
              <div className="trade-summary-row"><span>{side==="buy"?"Remaining Cash":"Cash After Sale"}</span><span>{fmt(side==="buy"?portfolio.cash-total:portfolio.cash+total)}</span></div>
            </div>
            <button className={`btn ${side==="buy"?"btn-buy":"btn-sell"}`} onClick={handleTrade}>{side==="buy"?`Buy ${symbol}`:`Sell ${symbol}`}</button>
          </div>
          {eduPopup && <EducationalPopup rule={eduPopup} onClose={()=>{setEduPopup(null);setPendingTrade(null)}} onProceed={()=>finalize(pendingTrade)} />}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════
    // WATCHLIST
    // ═══════════════════════════════════════════════════════
    function Watchlist({ onSelect }) {
      const [items, setItems] = useState(() => {
        const s = localStorage.getItem("watchlist");
        return s ? JSON.parse(s) : [
          {symbol:"AAPL",name:"Apple Inc"},{symbol:"MSFT",name:"Microsoft"},{symbol:"GOOGL",name:"Alphabet"},{symbol:"TSLA",name:"Tesla"},{symbol:"AMZN",name:"Amazon"}
        ];
      });
      const [quotes, setQuotes] = useState({});
      const [addSym, setAddSym] = useState("");

      useEffect(() => {
        localStorage.setItem("watchlist", JSON.stringify(items));
        items.forEach(async item => { const q = await getQuote(item.symbol); if (q) setQuotes(prev => ({...prev, [item.symbol]: q})); });
      }, [items]);

      const handleAdd = async () => {
        const sym = addSym.toUpperCase().trim();
        if (!sym || items.find(i=>i.symbol===sym)) return;
        const results = await searchSymbols(sym);
        const match = results.find(r=>r.symbol===sym) || results[0];
        setItems(prev => [...prev, { symbol: match?match.symbol:sym, name: match?match.description:sym }]);
        setAddSym("");
      };

      return (
        <div className="card">
          <div className="card-header"><h3>Watchlist</h3><span style={{fontSize:12,color:'var(--text-muted)'}}>{items.length} stocks</span></div>
          <div className="card-body">
            {items.map(item => {
              const q = quotes[item.symbol];
              const change = q ? (q.dp || ((q.c-q.pc)/q.pc*100)) : 0;
              return (
                <div key={item.symbol} className="watchlist-item" onClick={()=>onSelect(item.symbol,item.name)}>
                  <div className="watchlist-left">
                    <div className="watchlist-avatar">{item.symbol.slice(0,2)}</div>
                    <div><div className="watchlist-ticker">{item.symbol}</div><div className="watchlist-name">{item.name}</div></div>
                  </div>
                  <div className="watchlist-price">
                    <div className="price">{q?fmt(q.c):"..."}</div>
                    <div className={`change ${change>=0?'pnl-positive':'pnl-negative'}`}>{fmtPct(change)}</div>
                  </div>
                </div>
              );
            })}
            <div className="watchlist-add">
              <input placeholder="Add symbol..." value={addSym} onChange={e=>setAddSym(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleAdd()} />
              <button className="btn btn-outline btn-sm" onClick={handleAdd}>+</button>
            </div>
          </div>
        </div>
      );
    }

    // DASHBOARD PAGE
    // ═══════════════════════════════════════════════════════
    function DashboardPage() {
      const { portfolio, history, updatePrice } = useContext(PortfolioContext);
      const [sym, setSym] = useState(null);
      const [name, setName] = useState("");
      const [quote, setQuote] = useState(null);

      const handleSelect = async (s, n) => {
        setSym(s); setName(n||s);
        const q = await getQuote(s);
        setQuote(q);
        if (q && portfolio.positions[s]) updatePrice(s, q.c);
      };

      const totalPos = Object.values(portfolio.positions).reduce((s,p)=>s+p.shares*p.currentPrice,0);
      const totalVal = portfolio.cash + totalPos;
      const pnl = totalVal - STARTING_CASH;
      const pnlPct = ((totalVal/STARTING_CASH)-1)*100;

      return (
        <div className="page-enter">
          <div className="page-header">

            <div className="stat-card">
              <div className="stat-label">Portfolio Value</div>
              <div className="stat-value">{fmt(totalVal)}</div>

            </div>
            <div className="stat-card">
              <div className="stat-label">Cash Available</div>

              <div style={{fontSize:12,color:'var(--text-muted)',marginTop:6}}>{((portfolio.cash/totalVal)*100).toFixed(0)}% of portfolio</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Invested</div>
              <div className="stat-value">{fmt(totalPos)}</div>
              <div style={{fontSize:12,color:'var(--text-muted)',marginTop:6}}>{Object.keys(portfolio.positions).length} positions</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Total Trades</div>
              <div className="stat-value">{history.length}</div>
              <div style={{fontSize:12,color:'var(--text-muted)',marginTop:6}}>{history.filter(h=>h.side==='buy').length} buys, {history.filter(h=>h.side==='sell').length} sells</div>
            </div>
          </div>

          <div className="content-grid">
            <div>
              <div className="card" style={{marginBottom:20}}>
                <div className="card-header">
                  <h3>{sym ? `${sym} \u2014 ${name}` : "Select a Stock"}</h3>
                  {quote && (
                    <div style={{display:'flex',alignItems:'center',gap:14}}>
                      <span style={{fontSize:22,fontWeight:800}}>{fmt(quote.c)}</span>
                      <span className={`pnl-badge ${(quote.dp||0)>=0?'positive':'negative'}`}>{fmtPct(quote.dp||0)}</span>
                    </div>
                  )}
                </div>
                <div className="card-body">
                  {sym ? <StockChart symbol={sym} /> : (
                    <div className="empty-state">
                      <span className="empty-icon">{"\uD83D\uDCC8"}</span>
                      <h4>Ready to Trade</h4>
                      <p>Search for a stock above or click one from your watchlist to get started</p>
                    </div>
                  )}
                </div>
              </div>
              <Watchlist onSelect={handleSelect} />
            </div>
            <div><TradePanel symbol={sym} quote={quote} /></div>
          </div>
        </div>
      );
    }

    // PORTFOLIO PAGE
    // ═══════════════════════════════════════════════════════
    function PortfolioPage() {
      const { portfolio, history, resetPortfolio } = useContext(PortfolioContext);
      const addToast = useContext(ToastContext);
      const positions = Object.entries(portfolio.positions);
      const totalPos = positions.reduce((s,[,p])=>s+p.shares*p.currentPrice,0);
      const totalVal = portfolio.cash + totalPos;

      return (
        <div className="page-enter">
          <div className="page-header">
            <h2>Portfolio</h2>
            <button className="btn btn-outline btn-sm" onClick={()=>{resetPortfolio();addToast("Portfolio reset to $100,000","info")}}>Reset Portfolio</button>
          </div>

          <div className="stats-grid">
            <div className="stat-card"><div className="stat-label">Total Value</div><div className="stat-value">{fmt(totalVal)}</div></div>
            <div className="stat-card"><div className="stat-label">Cash</div><div className="stat-value">{fmt(portfolio.cash)}</div></div>
            <div className="stat-card"><div className="stat-label">Invested</div><div className="stat-value">{fmt(totalPos)}</div></div>
            <div className="stat-card">
              <div className="stat-label">Total P&L</div>
              <div className="stat-value" style={{color:totalVal>=STARTING_CASH?'var(--green)':'var(--red)'}}>{fmt(totalVal-STARTING_CASH)}</div>
            </div>
          </div>

          <div className="card" style={{marginBottom:20}}>
            <div className="card-header"><h3>Open Positions</h3><span style={{fontSize:12,color:'var(--text-muted)'}}>{positions.length} stocks</span></div>
            <div className="card-body" style={{padding:0,overflowX:'auto'}}>
              {positions.length === 0 ? (
                <div className="empty-state"><span className="empty-icon">{"\uD83D\uDCBC"}</span><h4>No Open Positions</h4><p>Head to the Dashboard to make your first trade!</p></div>
              ) : (
                <table className="positions-table">
                  <thead><tr><th>Symbol</th><th>Shares</th><th>Avg Cost</th><th>Current</th><th>Value</th><th>P&L</th><th>Return</th></tr></thead>
                  <tbody>
                    {positions.map(([sym, pos]) => {
                      const pnl = (pos.currentPrice-pos.avgCost)*pos.shares;
                      const pnlPct = ((pos.currentPrice/pos.avgCost)-1)*100;
                      return (
                        <tr key={sym}>
                          <td><div className="ticker"><div className="ticker-badge">{sym.slice(0,2)}</div>{sym}</div></td>
                          <td>{pos.shares}</td>
                          <td>{fmt(pos.avgCost)}</td>
                          <td style={{fontWeight:600}}>{fmt(pos.currentPrice)}</td>
                          <td style={{fontWeight:600}}>{fmt(pos.shares*pos.currentPrice)}</td>
                          <td className={pnl>=0?'pnl-positive':'pnl-negative'} style={{fontWeight:600}}>{fmt(pnl)}</td>
                          <td><span className={`pnl-badge ${pnlPct>=0?'positive':'negative'}`}>{fmtPct(pnlPct)}</span></td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              )}
            </div>
          </div>

          <div className="card">
            <div className="card-header"><h3>Trade History</h3><span style={{fontSize:12,color:'var(--text-muted)'}}>{history.length} trades</span></div>
            <div className="card-body">
              {history.length === 0 ? (
                <div className="empty-state"><span className="empty-icon">{"\uD83D\uDCDD"}</span><h4>No Trades Yet</h4><p>Your trade history will appear here</p></div>
              ) : (
                [...history].reverse().slice(0,50).map((h,i) => (
                  <div key={i} className="history-item">
                    <div style={{display:'flex',alignItems:'center',gap:12}}>
                      <span className={`history-badge ${h.side}`}>{h.side}</span>
                      <strong>{h.symbol}</strong>
                      <span style={{color:'var(--text-muted)'}}>{h.shares} shares @ {fmt(h.price)}</span>
                    </div>
                    <div style={{color:'var(--text-muted)',fontSize:12,fontWeight:500}}>{new Date(h.timestamp).toLocaleString()}</div>
                  </div>
                ))
              )}
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════
