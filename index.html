<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PaperTrader — Learn to Trade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- React -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

  <!-- Firebase 10 (compat for simplicity) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <!-- Lightweight chart library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lightweight-charts/4.1.1/lightweight-charts.standalone.production.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #242836;
      --border: #2e3348;
      --text: #e4e6f0;
      --text-dim: #8b8fa3;
      --accent: #6c5ce7;
      --accent-hover: #7e71ea;
      --green: #00b894;
      --green-bg: rgba(0,184,148,.12);
      --red: #e74c3c;
      --red-bg: rgba(231,76,60,.12);
      --yellow: #fdcb6e;
      --yellow-bg: rgba(253,203,110,.12);
      --blue: #74b9ff;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    #root { min-height: 100vh; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Auth Page */
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f1117 0%, #1a1d27 50%, #0f1117 100%);
    }
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 400px;
      max-width: 90vw;
    }
    .auth-card h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .auth-card .subtitle { color: var(--text-dim); margin-bottom: 32px; font-size: 14px; }
    .auth-card .logo { font-size: 36px; margin-bottom: 16px; display: block; }

    .input-group { margin-bottom: 16px; }
    .input-group label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 6px; }
    .input-group input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    .input-group input:focus { border-color: var(--accent); }

    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary { background: var(--accent); color: #fff; width: 100%; justify-content: center; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-google {
      background: #fff;
      color: #333;
      width: 100%;
      justify-content: center;
      margin-bottom: 16px;
    }
    .btn-google:hover { background: #f0f0f0; }
    .btn-sm { padding: 6px 14px; font-size: 13px; }
    .btn-success { background: var(--green); color: #fff; }
    .btn-success:hover { opacity: .9; }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-danger:hover { opacity: .9; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

    .divider {
      text-align: center;
      margin: 20px 0;
      color: var(--text-dim);
      font-size: 13px;
      position: relative;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: var(--border);
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .auth-toggle {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-dim);
    }
    .auth-toggle a {
      color: var(--accent);
      cursor: pointer;
      text-decoration: none;
    }
    .auth-toggle a:hover { text-decoration: underline; }

    .error-msg {
      background: var(--red-bg);
      color: var(--red);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
    }

    /* Layout */
    .app-layout { display: flex; min-height: 100vh; }
    .sidebar {
      width: 240px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px 0;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-brand {
      padding: 0 20px 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 12px;
    }
    .sidebar-brand h2 { font-size: 18px; font-weight: 700; }
    .sidebar-brand span { font-size: 12px; color: var(--text-dim); }

    .sidebar-nav { flex: 1; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 14px;
      transition: all .2s;
      border-left: 3px solid transparent;
    }
    .nav-item:hover { color: var(--text); background: var(--surface2); }
    .nav-item.active {
      color: var(--accent);
      background: rgba(108,92,231,.08);
      border-left-color: var(--accent);
    }
    .nav-item svg { width: 18px; height: 18px; }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
    }
    .user-info { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
    }
    .user-name { font-size: 13px; font-weight: 500; }
    .user-email { font-size: 11px; color: var(--text-dim); }

    .main-content {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      max-height: 100vh;
    }

    /* Dashboard */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .stat-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
    .stat-value { font-size: 24px; font-weight: 700; }
    .stat-change { font-size: 13px; margin-top: 4px; }
    .stat-change.up { color: var(--green); }
    .stat-change.down { color: var(--red); }

    .content-grid {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 20px;
    }
    @media (max-width: 1100px) {
      .content-grid { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-header h3 { font-size: 15px; font-weight: 600; }
    .card-body { padding: 20px; }

    /* Chart */
    .chart-controls {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    .chart-btn {
      padding: 4px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-size: 12px;
      cursor: pointer;
    }
    .chart-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    #chart-container { width: 100%; height: 350px; border-radius: 8px; overflow: hidden; }

    /* Search */
    .search-box {
      position: relative;
      margin-bottom: 16px;
    }
    .search-box input {
      width: 100%;
      padding: 10px 14px 10px 38px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    .search-box input:focus { border-color: var(--accent); }
    .search-box svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      width: 16px;
      height: 16px;
    }
    .search-results {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      max-height: 240px;
      overflow-y: auto;
      z-index: 100;
      margin-top: 4px;
    }
    .search-result-item {
      padding: 10px 14px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      font-size: 14px;
    }
    .search-result-item:hover { background: var(--surface2); }
    .search-result-item .symbol { font-weight: 600; }
    .search-result-item .name { color: var(--text-dim); font-size: 12px; }

    /* Trade Panel */
    .trade-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .trade-tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: none;
      border: none;
      color: var(--text-dim);
      border-bottom: 2px solid transparent;
    }
    .trade-tab.active-buy { color: var(--green); border-bottom-color: var(--green); }
    .trade-tab.active-sell { color: var(--red); border-bottom-color: var(--red); }

    .trade-form { padding: 20px; }
    .trade-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 14px;
    }
    .trade-row label { color: var(--text-dim); }
    .trade-input {
      width: 120px;
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
      text-align: right;
      outline: none;
    }
    .trade-input:focus { border-color: var(--accent); }
    .trade-summary {
      background: var(--bg);
      border-radius: 8px;
      padding: 14px;
      margin: 16px 0;
      font-size: 13px;
    }
    .trade-summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .trade-summary-row:last-child { margin-bottom: 0; font-weight: 600; }

    .btn-buy { background: var(--green); color: #fff; width: 100%; justify-content: center; }
    .btn-buy:hover { filter: brightness(1.1); }
    .btn-sell { background: var(--red); color: #fff; width: 100%; justify-content: center; }
    .btn-sell:hover { filter: brightness(1.1); }

    /* Portfolio */
    .positions-table { width: 100%; }
    .positions-table th {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--text-dim);
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }
    .positions-table td {
      padding: 12px;
      font-size: 14px;
      border-bottom: 1px solid var(--border);
    }
    .positions-table tr:last-child td { border-bottom: none; }
    .positions-table .ticker { font-weight: 600; }

    .pnl-positive { color: var(--green); }
    .pnl-negative { color: var(--red); }

    /* Watchlist */
    .watchlist-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .watchlist-item:last-child { border-bottom: none; }
    .watchlist-item:hover { opacity: .85; }
    .watchlist-ticker { font-weight: 600; font-size: 14px; }
    .watchlist-name { font-size: 11px; color: var(--text-dim); }
    .watchlist-price { text-align: right; }
    .watchlist-price .price { font-weight: 600; font-size: 14px; }
    .watchlist-price .change { font-size: 12px; }

    .watchlist-add {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .watchlist-add input {
      flex: 1;
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      outline: none;
    }

    /* Education popup */
    .edu-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn .2s;
    }
    @keyframes fadeIn { from { opacity: 0; } }

    .edu-popup {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 500px;
      max-width: 90vw;
      max-height: 80vh;
      overflow-y: auto;
      animation: slideUp .3s;
    }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } }

    .edu-popup-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .edu-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .edu-icon.warning { background: var(--yellow-bg); }
    .edu-icon.info { background: rgba(116,185,255,.12); }
    .edu-icon.danger { background: var(--red-bg); }
    .edu-popup-header h3 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .edu-popup-header .edu-category { font-size: 12px; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }

    .edu-popup-body { padding: 20px 24px; }
    .edu-popup-body p { font-size: 14px; line-height: 1.7; color: var(--text); margin-bottom: 14px; }
    .edu-popup-body .edu-tip {
      background: var(--bg);
      border-left: 3px solid var(--accent);
      padding: 12px 16px;
      border-radius: 0 8px 8px 0;
      margin: 14px 0;
      font-size: 13px;
      line-height: 1.6;
    }

    .edu-popup-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .edu-dont-show { font-size: 12px; color: var(--text-dim); display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .edu-dont-show input { accent-color: var(--accent); }

    /* Trade History */
    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .history-item:last-child { border-bottom: none; }
    .history-badge {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .history-badge.buy { background: var(--green-bg); color: var(--green); }
    .history-badge.sell { background: var(--red-bg); color: var(--red); }

    /* Learn page */
    .lesson-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .lesson-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      cursor: pointer;
      transition: all .2s;
    }
    .lesson-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .lesson-card .lesson-icon { font-size: 28px; margin-bottom: 12px; }
    .lesson-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
    .lesson-card p { font-size: 13px; color: var(--text-dim); line-height: 1.5; }
    .lesson-card .lesson-tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      margin-top: 12px;
    }
    .lesson-tag.beginner { background: var(--green-bg); color: var(--green); }
    .lesson-tag.intermediate { background: var(--yellow-bg); color: var(--yellow); }
    .lesson-tag.advanced { background: var(--red-bg); color: var(--red); }

    /* Toast */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .toast {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      min-width: 280px;
      animation: slideIn .3s;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 13px;
    }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } }
    .toast.success { border-left: 3px solid var(--green); }
    .toast.error { border-left: 3px solid var(--red); }
    .toast.warning { border-left: 3px solid var(--yellow); }
    .toast.info { border-left: 3px solid var(--blue); }

    /* Loading */
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-dim);
    }
    .empty-state .emoji { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* Config banner */
    .config-banner {
      background: var(--yellow-bg);
      color: var(--yellow);
      padding: 12px 20px;
      text-align: center;
      font-size: 13px;
      border-bottom: 1px solid rgba(253,203,110,.3);
    }
    .config-banner a { color: var(--yellow); font-weight: 600; }
  </style>
</head>

    const I18nContext = createContext(null);

    function I18nProvider({ children }) {
      const [locale, setLocale] = useState(() => localStorage.getItem('papertrader_locale') || 'en');
      const t = useCallback((key, params = {}) => {
        let str = TRANSLATIONS[locale]?.[key] || TRANSLATIONS.en[key] || key;
        for (const [k, v] of Object.entries(params)) str = str.replace(`{${k}}`, v);
        return str;
      }, [locale]);
      const setLanguage = useCallback(lang => {
        setLocale(lang);
        localStorage.setItem('papertrader_locale', lang);
      }, []);
      return <I18nContext.Provider value={{ locale, t, setLanguage }}>{children}</I18nContext.Provider>;
    }
    function useI18n() { return useContext(I18nContext); }

    const finnhubApiKey = FINNHUB_API_KEY !== "YOUR_FINNHUB_API_KEY" ? FINNHUB_API_KEY : null;

    async function searchSymbols(query) {
      if (!finnhubApiKey || !query) return [];
      try {
        const res = await fetch(`https://finnhub.io/api/v1/search?q=${encodeURIComponent(query)}&token=${finnhubApiKey}`);
        const data = await res.json();
        return (data.result || [])
          .filter(r => r.type === "Common Stock" && !r.symbol.includes("."))
          .slice(0, 8);
      } catch { return []; }
    }

    async function getQuote(symbol) {
      if (!finnhubApiKey) {
        // Demo data
        const base = Math.random() * 200 + 20;
        return { c: base, h: base*1.02, l: base*0.98, o: base*1.01, pc: base*0.99, dp: (Math.random()-0.5)*4 };
      }
      try {
        const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${finnhubApiKey}`);
        return await res.json();
      } catch { return null; }
    }

    async function getCandles(symbol, resolution = "D", from, to) {
      if (!finnhubApiKey) {
        // Generate demo candle data
        const candles = [];
        let price = 150;
        const now = Math.floor(Date.now() / 1000);
        for (let i = 90; i >= 0; i--) {
          const t = now - i * 86400;
          price += (Math.random() - 0.48) * 4;
          price = Math.max(20, price);
          candles.push({
            time: t,
            open: price + (Math.random()-0.5)*2,
            high: price + Math.random()*3,
            low: price - Math.random()*3,
            close: price,
            volume: Math.floor(Math.random()*5000000)
          });
        }
        return candles;
      }
      if (!from) { to = Math.floor(Date.now()/1000); from = to - 90*86400; }
      try {
        const res = await fetch(`https://finnhub.io/api/v1/stock/candle?symbol=${symbol}&resolution=${resolution}&from=${from}&to=${to}&token=${finnhubApiKey}`);
        const data = await res.json();
        if (data.s !== "ok") return [];
        return data.t.map((t, i) => ({
          time: t, open: data.o[i], high: data.h[i], low: data.l[i], close: data.c[i], volume: data.v[i]
        }));
      } catch { return []; }
    }

    async function getCompanyNews(symbol) {
      if (!finnhubApiKey) {
        const now = Math.floor(Date.now()/1000);
        const mk = (h, src) => ({id:now+h,headline:h,source:src,datetime:now-h*3600,summary:"Educational sample news item for demo mode.",url:"https://example.com",image:""});
        return [
          mk(`${symbol} launches new product line`,`MarketWatch`),
          mk(`${symbol} beats earnings expectations`,`Reuters`),
          mk(`Analysts upgrade ${symbol} to Buy`,`Bloomberg`),
        ];
      }
      try {
        const to = new Date();
        const from = new Date(Date.now()-7*24*60*60*1000);
        const f = from.toISOString().slice(0,10);
        const t = to.toISOString().slice(0,10);
        const res = await fetch(`https://finnhub.io/api/v1/company-news?symbol=${symbol}&from=${f}&to=${t}&token=${finnhubApiKey}`);
        const data = await res.json();
        return (Array.isArray(data)?data:[]).slice(-5).reverse();
      } catch { return []; }
    }

    function checkEducationalRules(portfolio, trade, history, quote) {
      const dismissed = JSON.parse(localStorage.getItem("edu_dismissed") || "{}");
      const triggered = [];
      for (const [key, rule] of Object.entries(EDUCATION_RULES)) {
        if (dismissed[key]) continue;
        const result = rule.check(portfolio, trade, history, quote);
        if (result.trigger) {
          triggered.push({ ...rule, data: result.data });
        }
      }
      return triggered;
    }

    function formatMoney(n) {
      return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(n);
    }
    function formatPct(n) {
      const sign = n >= 0 ? '+' : '';
      return `${sign}${n.toFixed(2)}%`;
    }
    function formatNum(n) {
      if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
      if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
      if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
      return n.toString();
    }

    function ToastProvider({ children }) {
      const [toasts, setToasts] = useState([]);
      const addToast = useCallback((msg, type = "info") => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, msg, type }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000);
      }, []);
      return (
        <ToastContext.Provider value={addToast}>
          {children}
          <div className="toast-container">
            {toasts.map(t => (
              <div key={t.id} className={`toast ${t.type}`}>
                <span>{t.type === "success" ? "\u2705" : t.type === "error" ? "\u274C" : t.type === "warning" ? "\u26A0\uFE0F" : "\u2139\uFE0F"}</span>
                <span>{t.msg}</span>
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );

    // ═══════════════════════════════════════════════════════
    // PORTFOLIO PROVIDER
    // ═══════════════════════════════════════════════════════
    function PortfolioProvider({ children }) {
      const { user } = useContext(AuthContext);
      const [portfolio, setPortfolio] = useState(null);
      const [history, setHistory] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        if (!user) return;
        loadPortfolio();
      }, [user]);

      const loadPortfolio = async () => {
        const key = `portfolio_${user.uid}`;
        const saved = localStorage.getItem(key);
        if (saved) {
          const data = JSON.parse(saved);
          setPortfolio(data.portfolio);
          setHistory(data.history || []);
        } else {
          setPortfolio({ cash: STARTING_CASH, positions: {} });
          setHistory([]);
        }
        setLoading(false);
      };

      const save = (p, h) => {
        const key = `portfolio_${user.uid}`;
        localStorage.setItem(key, JSON.stringify({ portfolio: p, history: h }));
      };

      const executeTrade = (symbol, shares, price, side) => {
        setPortfolio(prev => {
          const next = { ...prev, positions: { ...prev.positions } };
          if (side === "buy") {
            const cost = shares * price;
            next.cash -= cost;
            const existing = next.positions[symbol];
            if (existing) {
              const totalShares = existing.shares + shares;
              const totalCost = existing.avgCost * existing.shares + price * shares;
              next.positions[symbol] = { shares: totalShares, avgCost: totalCost / totalShares, currentPrice: price };
            } else {
              next.positions[symbol] = { shares, avgCost: price, currentPrice: price };
            }
          } else {
            const existing = next.positions[symbol];
            if (existing) {
              next.cash += shares * price;
              const remainingShares = existing.shares - shares;
              if (remainingShares <= 0) {
                delete next.positions[symbol];
              } else {
                next.positions[symbol] = { ...existing, shares: remainingShares, currentPrice: price };
              }
            }
          }
          const newTrade = { symbol, shares, price, side, timestamp: Date.now() };
          const newHistory = [...history, newTrade];
          setHistory(newHistory);
          save(next, newHistory);
          return next;
        });
      };

      const updatePrice = (symbol, price) => {
        setPortfolio(prev => {
          if (!prev.positions[symbol]) return prev;
          const next = { ...prev, positions: { ...prev.positions } };
          next.positions[symbol] = { ...next.positions[symbol], currentPrice: price };
          return next;
        });
      };

      const resetPortfolio = () => {
        const p = { cash: STARTING_CASH, positions: {} };
        const h = [];
        setPortfolio(p);
        setHistory(h);
        save(p, h);
      };

      if (loading) return null;

      return (
        <PortfolioContext.Provider value={{ portfolio, history, executeTrade, updatePrice, resetPortfolio }}>
          {children}
        </PortfolioContext.Provider>
      );
    }

    // ═══════════════════════════════════════════════════════
    // STOCK CHART
    // ═══════════════════════════════════════════════════════
    function StockChart({ symbol, onCandles }) {
      const chartRef = useRef(null);
      const chartInstance = useRef(null);
      const resizeObserverRef = useRef(null);
      const [resolution, setResolution] = useState("D");
      const [showIndicator, setShowIndicator] = useState(null);

      useEffect(() => {
        if (!chartRef.current || !symbol) return;
        let cancelled = false;
        const ensureChart = () => {
          const container = chartRef.current;
          if (!container || container.clientWidth === 0) {
            requestAnimationFrame(ensureChart);
            return;
          }
          loadChart(container, cancelled);
        };
        ensureChart();
        return () => {
          cancelled = true;
          if (resizeObserverRef.current && chartRef.current) {
            resizeObserverRef.current.disconnect();
            resizeObserverRef.current = null;
          }
          if (chartInstance.current) {
            chartInstance.current.remove();
            chartInstance.current = null;
          }
        };
      }, [symbol, resolution]);

      const loadChart = async (container, cancelled) => {
        try {
          if (chartInstance.current) {
            chartInstance.current.remove();
            chartInstance.current = null;
          }
          if (!container || cancelled) return;
          const chart = LightweightCharts.createChart(container, {
            width: container.clientWidth,
            height: 350,
            layout: { background: { type: 'solid', color: '#1a1d27' }, textColor: '#8b8fa3' },
            grid: { vertLines: { color: '#2e3348' }, horzLines: { color: '#2e3348' } },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            rightPriceScale: { borderColor: '#2e3348' },
            timeScale: { borderColor: '#2e3348', timeVisible: resolution !== 'D' && resolution !== 'W' },
          });
          chartInstance.current = chart;

          const candles = await getCandles(symbol, resolution);
          if (cancelled) return;
          if (Array.isArray(candles) && candles.length > 0) {
            const candleSeries = chart.addCandlestickSeries({
              upColor: '#00b894', downColor: '#e74c3c',
              borderUpColor: '#00b894', borderDownColor: '#e74c3c',
              wickUpColor: '#00b894', wickDownColor: '#e74c3c',
            });
            candleSeries.setData(candles.map(c => ({
              time: c.time,
              open: c.open, high: c.high, low: c.low, close: c.close
            })));

            if (onCandles) onCandles(candles);

            if (candles.length >= 20) {
              const smaData = [];
              for (let i = 19; i < candles.length; i++) {
                const sum = candles.slice(i-19, i+1).reduce((s, c) => s + c.close, 0);
                smaData.push({ time: candles[i].time, value: sum / 20 });
              }
              const smaSeries = chart.addLineSeries({ color: '#74b9ff', lineWidth: 1 });
              smaSeries.setData(smaData);
            }

            const volumeSeries = chart.addHistogramSeries({
              priceFormat: { type: 'volume' },
              priceScaleId: '',
            });
            chart.priceScale('').applyOptions({
              scaleMargins: { top: 0.8, bottom: 0 },
            });
            volumeSeries.setData(candles.map(c => ({
              time: c.time,
              value: c.volume,
              color: c.close >= c.open ? 'rgba(0,184,148,0.3)' : 'rgba(231,76,60,0.3)'
            })));
          }
          chart.timeScale().fitContent();

          const ro = new ResizeObserver(() => {
            if (!chartRef.current) return;
            chart.applyOptions({ width: chartRef.current.clientWidth || 0 });
          });
          ro.observe(container);
          resizeObserverRef.current = ro;
        } catch (e) {
          console.warn("Chart error", e);
        }
      };

      return (
        <div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <div className="chart-controls">
              {["5","15","60","D","W"].map(r => (
                <button key={r} className={`chart-btn ${resolution === r ? 'active' : ''}`}
                  onClick={() => setResolution(r)}>{r === "60" ? "1H" : r}</button>
              ))}
            </div>
            <div className="chart-controls">
              {["rsi","macd","moving_averages","volume"].map(ind => (
                <button key={ind} className="chart-btn" onClick={() => setShowIndicator(ind)}
                  style={{fontSize:11}}>{ind === "moving_averages" ? "MA" : ind.toUpperCase()}</button>
              ))}
            </div>
          </div>
          <div ref={chartRef} style={{width:'100%',height:350,borderRadius:8,overflow:'hidden'}} />
          {showIndicator && <IndicatorPopup indicator={showIndicator} onClose={() => setShowIndicator(null)} />}
        </div>
      );
    }

    function TradePanel({ symbol, quote }) {
      const { portfolio, history, executeTrade } = useContext(PortfolioContext);
      const addToast = useContext(ToastContext);
      const { t } = useI18n();
      const [side, setSide] = useState("buy");
      const [shares, setShares] = useState("");
      const [eduPopup, setEduPopup] = useState(null);
      const [pendingTrade, setPendingTrade] = useState(null);

      if (!symbol || !quote) return (

          <div className="card-body">
            <div className="empty-state">
              <div className="emoji">{"\uD83D\uDD0D"}</div>
              <p>{t('trade.noStockDesc')}</p>
            </div>
          </div>
        </div>
      );

      const price = quote.c || 0;
      const numShares = parseInt(shares) || 0;
      const total = numShares * price;
      const position = portfolio.positions[symbol];
      const maxBuyShares = Math.floor(portfolio.cash / price);
      const maxSellShares = position?.shares || 0;

      const handleTrade = () => {
        if (numShares <= 0) return addToast(t('trade.enterShares'), "error");
        if (side === "buy" && total > portfolio.cash) return addToast(t('trade.insufficientFunds'), "error");
        if (side === "sell" && numShares > maxSellShares) return addToast(t('trade.notEnoughShares'), "error");

        const trade = { symbol, shares: numShares, price, side };
        const rules = checkEducationalRules(portfolio, trade, history, quote);
        if (rules.length > 0) {
          setEduPopup(rules[0]);
          setPendingTrade(trade);
          return;
        }
        finalizeTrade(trade);
      };

      const finalizeTrade = (trade) => {
        executeTrade(trade.symbol, trade.shares, trade.price, trade.side);
        addToast(`${trade.side === "buy" ? t('trade.bought') : t('trade.sold')} ${trade.shares} ${t('trade.sharesOf')} ${trade.symbol} ${t('trade.at')} ${formatMoney(trade.price)}`, "success");
        setShares("");
        setEduPopup(null);
        setPendingTrade(null);
      };

      return (
        <div className="card">
          <div className="trade-tabs">
            <button className={`trade-tab ${side === "buy" ? "active-buy" : ""}`} onClick={() => setSide("buy")}>{t('trade.buy')}</button>
            <button className={`trade-tab ${side === "sell" ? "active-sell" : ""}`} onClick={() => setSide("sell")}>{t('trade.sell')}</button>
          </div>
          <div className="trade-form">
            <div className="trade-row">
              <label>{t('trade.symbol')}</label>
              <strong>{symbol}</strong>
            </div>
            <div className="trade-row">
              <label>{t('trade.marketPrice')}</label>
              <span>{formatMoney(price)}</span>
            </div>
            <div className="trade-row">
              <label>{t('trade.shares')}</label>
              <input className="trade-input" type="number" min="1"
                max={side === "buy" ? maxBuyShares : maxSellShares}
                value={shares} onChange={e => setShares(e.target.value)}
                placeholder="0" />
            </div>
            <div style={{textAlign:'right',fontSize:12,color:'var(--text-dim)',marginBottom:8}}>
              {t('trade.max')}: {side === "buy" ? maxBuyShares : maxSellShares}
            </div>
            <div className="trade-summary">
              <div className="trade-summary-row"><span>{t('trade.estimatedTotal')}</span><span>{formatMoney(total)}</span></div>
              <div className="trade-summary-row"><span>{t('trade.cashAvailable')}</span><span>{formatMoney(portfolio.cash)}</span></div>
              {side === "buy" && <div className="trade-summary-row"><span>{t('trade.remainingCash')}</span><span>{formatMoney(portfolio.cash - total)}</span></div>}
            </div>
            <button className={`btn ${side === "buy" ? "btn-buy" : "btn-sell"}`} onClick={handleTrade}>
              {side === "buy" ? `${t('trade.buy')} ${symbol}` : `${t('trade.sell')} ${symbol}`}
            </button>
          </div>
          {eduPopup && (
            <EducationalPopup rule={eduPopup}
              onClose={() => { setEduPopup(null); setPendingTrade(null); }}
              onProceed={() => finalizeTrade(pendingTrade)} />
          )}
        </div>
      );
    }

    function Watchlist({ onSelect, activeSymbol }) {
      const { t } = useI18n();
      const [items, setItems] = useState(() => {
        const saved = localStorage.getItem("watchlist");
        return saved ? JSON.parse(saved) : [
          { symbol: "AAPL", name: "Apple Inc" },
          { symbol: "MSFT", name: "Microsoft" },
          { symbol: "GOOGL", name: "Alphabet" },
          { symbol: "TSLA", name: "Tesla" },
          { symbol: "AMZN", name: "Amazon" },
        ];
      });
      const [quotes, setQuotes] = useState({});
      const [addSymbol, setAddSymbol] = useState("");

      useEffect(() => {
        localStorage.setItem("watchlist", JSON.stringify(items));
        items.forEach(async (item) => {
          const q = await getQuote(item.symbol);
          if (q) setQuotes(prev => ({ ...prev, [item.symbol]: q }));
        });
      }, [items]);

      const handleAdd = async () => {
        const sym = addSymbol.toUpperCase().trim();
        if (!sym || items.find(i => i.symbol === sym)) return;
        const results = await searchSymbols(sym);
        const match = results.find(r => r.symbol === sym) || results[0];
        if (match) {
          setItems(prev => [...prev, { symbol: match.symbol, name: match.description }]);
        } else {
          setItems(prev => [...prev, { symbol: sym, name: sym }]);
        }
        setAddSymbol("");
      };

      const handleRemove = (sym) => {
        setItems(prev => prev.filter(i => i.symbol !== sym));
      };

      return (
        <div className="card">
          <div className="card-header"><h3>{t('watch.title')}</h3></div>
          <div className="card-body">
            {items.map(item => {
              const q = quotes[item.symbol];
              const change = q ? (q.dp || ((q.c - q.pc) / q.pc * 100)) : 0;
              return (
                <div key={item.symbol} className="watchlist-item" onClick={() => onSelect(item.symbol, item.name)}>
                  <div>
                    <div className="watchlist-ticker">{item.symbol}</div>
                    <div className="watchlist-name">{item.name}</div>
                  </div>
                  <div className="watchlist-price">
                    <div className="price">{q ? formatMoney(q.c) : "..."}</div>
                    <div className={`change ${change >= 0 ? 'pnl-positive' : 'pnl-negative'}`}>
                      {formatPct(change)}
                    </div>
                  </div>
                </div>
              );
            })}
            <div className="watchlist-add">
              <input placeholder={t('watch.addPlaceholder')} value={addSymbol}
                onChange={e => setAddSymbol(e.target.value)}
                onKeyDown={e => e.key === "Enter" && handleAdd()} />
              <button className="btn btn-outline btn-sm" onClick={handleAdd}>+</button>
            </div>
          </div>
        </div>
      );
    }

    function StockDetails({ quote, profile, candles }) {

      if (candles && candles.length) {
        high52 = candles.reduce((m,c) => Math.max(m,c.high), candles[0].high);

    function timeAgoStr(ts, t) {
      const diff = Math.floor((Date.now()/1000 - ts));
      const m = Math.floor(diff/60), h = Math.floor(m/60), d = Math.floor(h/24);
      if (diff < 60) return t('time.ago.now');
      if (h < 1) return t('time.ago.minutes',{n:m});
      if (d < 1) return t('time.ago.hours',{n:h});
      return t('time.ago.days',{n:d});
    }

        icon: "\uD83D\uDCB0", title: "Tipos de Órdenes", level: "beginner",
        content: "Orden de Mercado: Compra o vende inmediatamente al precio actual. Tiene ejecución rápida, pero puede no coincidir exactamente con el precio que ves.\n\nOrden Limitada: Fija un precio máximo para comprar o mínimo para vender. Garantiza tu precio, pero puede que no se ejecute si el mercado no llega a ese nivel.\n\nOrden Stop-Loss: Vende automáticamente cuando una acción cae a un precio determinado. Es esencial para gestionar el riesgo.\n\nOrden Stop-Limit: Combina características de stop-loss y orden limitada. Se activa a un precio y se ejecuta a otro."
      },
      {
        icon: "\u26A0\uFE0F", title: "Regla del Day Trader Patrón (PDT)", level: "beginner",
        content: "La regla PDT es una regulación de FINRA que aplica a cuentas de margen. Si realizas 4 o más operaciones intradía (comprar y vender la misma acción en el mismo día) en 5 días hábiles, y representan más del 6% de tu actividad, tu cuenta es marcada.\n\nUna vez marcada, debes mantener al menos $25,000 en la cuenta para seguir haciendo day trading. Si tu saldo baja de $25k, quedarás restringido a solo cerrar posiciones por 90 días.\n\nEstrategias: Mantener posiciones de un día para otro, usar una cuenta de efectivo (sin PDT pero con liquidación más lenta) o mantener tu saldo por encima de $25k."
      },
      {
        icon: "\uD83D\uDEE1\uFE0F", title: "Gestión de Riesgo", level: "intermediate",
        content: "Regla del 1%: Nunca arriesgues más del 1% de tu portafolio en una sola operación. Con una cuenta de $100k, tu pérdida máxima por operación debería ser de $1,000.\n\nTamaño de Posición: Calcula el tamaño según tu stop-loss y tolerancia al riesgo. Tamaño de Posición = Monto en Riesgo / (Precio de Entrada - Precio de Stop).\n\nDiversificación: No pongas todos los huevos en la misma canasta. Diversifica entre distintos sectores (tecnología, salud, energía, etc.) y tipos de activos.\n\nRelación Riesgo/Beneficio: Apunta al menos a 2:1 — tu beneficio potencial debería ser al menos el doble de tu posible pérdida."
      },
      {
        icon: "\uD83D\uDCC8", title: "Fundamentos del Análisis Técnico", level: "intermediate",
        content: "Soporte y Resistencia: Niveles de precio donde las acciones tienden a girar. El soporte es un suelo (presión compradora) y la resistencia un techo (presión vendedora).\n\nMedias Móviles: Las medias de 50 y 200 días son claves. 'Golden Cross' (la de 50 cruza por encima de la de 200) es alcista. 'Death Cross' es bajista.\n\nRSI (0-100): Por encima de 70 puede indicar sobrecompra; por debajo de 30, sobreventa. Funciona mejor en mercados laterales.\n\nMACD: Muestra el impulso de la tendencia. Cruces de la línea de señal pueden indicar oportunidades de compra/venta.\n\nVolumen: Confirma los movimientos de precio. Alto volumen = convicción fuerte. Bajo volumen = movimientos débiles, más fáciles de revertir."
      },
      {
        icon: "\uD83E\uDDE0", title: "Psicología del Trading", level: "intermediate",
        content: "FOMO (miedo a perderse la oportunidad): Impulso de comprar una acción solo porque está subiendo. Esto suele llevar a comprar en máximos. Mantente fiel a tu plan.\n\nAversión a la Pérdida: Las personas sienten el dolor de perder el doble de fuerte que la alegría de ganar. Esto lleva a aguantar perdedoras demasiado tiempo y a vender ganadoras muy pronto.\n\nSesgo de Confirmación: Buscar solo información que confirme tu posición e ignorar la contraria. Considera siempre el escenario opuesto.\n\nTrading de Venganza: Operar impulsivamente para recuperar pérdidas. Toma un descanso tras una racha negativa.\n\nSobreoperar: Hacer demasiadas operaciones por buscar acción. Calidad sobre cantidad. Los mejores traders esperan pacientemente configuraciones ideales."
      },
      {
        icon: "\uD83D\uDCC5", title: "Estrategias de Day Trading", level: "advanced",
        content: "Scalping: Hacer decenas de operaciones al día buscando ganancias muy pequeñas. Requiere spreads muy ajustados, ejecución rápida y mucha disciplina.\n\nTrading de Momentum: Subirse a acciones con fuerte volumen y movimiento de precio. Busca catalizadores (resultados, noticias) que impulsen grandes movimientos.\n\nTrading de Breakout: Entrar cuando el precio rompe resistencias o soportes con alto volumen. Clave: esperar confirmación antes de entrar.\n\nTrading de Reversión: Apostar a que un movimiento extendido se revertirá. Riesgo alto pero potencialmente muy rentable. Usa RSI y patrones de velas.\n\nTrading de Gaps: Operar acciones que abren muy por encima o por debajo del cierre previo. Estrategias de 'gap and go' vs 'gap fill'."
      },
      {
        icon: "\uD83D\uDCCA", title: "Leer Estados Financieros", level: "advanced",
        content: "Estado de Resultados: Ingresos, gastos y beneficio. Busca crecimiento consistente de ingresos y mejora de márgenes. La utilidad por acción (EPS) es clave.\n\nBalance General: Activos, pasivos y patrimonio. Revisa el ratio deuda/capital. Mucha deuda puede ser peligrosa en recesiones.\n\nEstado de Flujos de Efectivo: Muestra cómo entra y sale el dinero. El flujo de caja libre (FCF) es uno de los indicadores más importantes y difícil de manipular.\n\nRatio P/E: Precio dividido por ganancias. Compáralo con el promedio del sector. P/E alto puede significar sobrevaloración o altas expectativas de crecimiento.\n\nRatio PEG: P/E dividido por la tasa de crecimiento. Un PEG de 1 ≈ valor razonable; por debajo de 1 puede sugerir infravaloración."
      },
    ];

    function LearnPage() {
      const { locale, t } = useI18n();
      const [activeTopic, setActiveTopic] = useState(null);

      const lessons = locale === 'es' ? LESSONS_ES : LESSONS_EN;

      if (activeTopic !== null) {
        const lesson = lessons[activeTopic];
        return (
          <div>
            <button className="btn btn-outline btn-sm" style={{marginBottom:20}} onClick={() => setActiveTopic(null)}>
              {t('learn.back')}
            </button>
            <div className="card">
              <div className="card-header">
                <h3><span style={{marginRight:8}}>{lesson.icon}</span>{lesson.title}</h3>
                <span className={`lesson-tag ${lesson.level}`}>{lesson.level}</span>
              </div>
              <div className="card-body">
                {lesson.content.split("\n\n").map((para, i) => (
                  <p key={i} style={{marginBottom:16,lineHeight:1.8,fontSize:14}}>{para}</p>
                ))}
              </div>
            </div>
          </div>
        );
      }

      return (
        <div>
          <h2 style={{marginBottom:8}}>{t('learn.title')}</h2>
          <p style={{color:'var(--text-dim)',marginBottom:24,fontSize:14}}>{t('learn.subtitle')}</p>
          <div className="lesson-grid">
            {lessons.map((lesson, i) => (
              <div key={i} className="lesson-card" onClick={() => setActiveTopic(i)}>
                <div className="lesson-icon">{lesson.icon}</div>
                <h3>{lesson.title}</h3>
                <p>{lesson.content.substring(0, 100)}...</p>
                <span className={`lesson-tag ${lesson.level}`}>{lesson.level}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════
    // SIDEBAR NAV ICONS
    // ═══════════════════════════════════════════════════════
    const icons = {
      dashboard: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>,
      portfolio: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>,
      learn: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
      logout: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
    };

    // ═══════════════════════════════════════════════════════
    // MAIN APP
    // ═══════════════════════════════════════════════════════
    function AppShell() {
      const { user, logout } = useContext(AuthContext);
      const { locale, t, setLanguage } = useI18n();
      const [page, setPage] = useState("dashboard");

      const needsConfig = FIREBASE_CONFIG.apiKey === "YOUR_FIREBASE_API_KEY" || FINNHUB_API_KEY === "YOUR_FINNHUB_API_KEY";

      return (
        <div className="app-layout">
          <div className="sidebar">
            <div className="sidebar-brand">
              <h2>{"\uD83D\uDCC8"} {t('auth.title')}</h2>
              <span>{t('nav.tagline')}</span>
            </div>
            <div className="sidebar-nav">
              <div className={`nav-item ${page === "dashboard" ? "active" : ""}`} onClick={() => setPage("dashboard")}>
                {icons.dashboard} {t('nav.dashboard')}
              </div>
              <div className={`nav-item ${page === "portfolio" ? "active" : ""}`} onClick={() => setPage("portfolio")}>
                {icons.portfolio} {t('nav.portfolio')}
              </div>
              <div className={`nav-item ${page === "learn" ? "active" : ""}`} onClick={() => setPage("learn")}>
                {icons.learn} {t('nav.learn')}
              </div>
            </div>
            <div style={{ padding: '8px 12px', display: 'flex', gap: 4 }}>
              <button className={`chart-btn ${locale === 'en' ? 'active' : ''}`} onClick={() => setLanguage('en')} style={{ flex: 1 }}>
                EN
              </button>
              <button className={`chart-btn ${locale === 'es' ? 'active' : ''}`} onClick={() => setLanguage('es')} style={{ flex: 1 }}>
                ES
              </button>
            </div>
            <div className="sidebar-footer">
              <div className="user-info">
                <div className="user-avatar">{(user.displayName || user.email || "U")[0].toUpperCase()}</div>
                <div>
                  <div className="user-name">{user.displayName || "Trader"}</div>
                  <div className="user-email">{user.email}</div>
                </div>
              </div>
              <button className="btn btn-outline btn-sm" style={{width:'100%',justifyContent:'center'}} onClick={logout}>
                {icons.logout} {t('nav.signOut')}
              </button>
            </div>
          </div>
          <div className="main-content">
            {needsConfig && (
              <div className="config-banner">
                {t('config.demo')} <strong>{t('config.demoMode')}</strong> {t('config.demoDesc')}
              </div>
            )}
            {page === "dashboard" && <DashboardPage />}
            {page === "portfolio" && <PortfolioPage />}
            {page === "learn" && <LearnPage />}
          </div>
        </div>
      );
    }

    function App() {
      return (
        <I18nProvider>
          <ToastProvider>
            <AuthProvider>
              <AuthContext.Consumer>
                {({ user }) => user ? (
                  <PortfolioProvider><AppShell /></PortfolioProvider>
                ) : (
                  <LoginPage />
                )}
              </AuthContext.Consumer>
            </AuthProvider>
          </ToastProvider>
        </I18nProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
