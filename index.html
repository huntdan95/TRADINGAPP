<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PaperTrader — Learn to Trade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- React -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

  <!-- Firebase 10 (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <!-- Lightweight chart library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lightweight-charts/4.1.1/lightweight-charts.standalone.production.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0c10;
      --bg2: #0f1117;
      --surface: #141720;
      --surface2: #1c2030;
      --surface3: #242940;
      --border: #1e2235;
      --border-hover: #2e3450;
      --text: #e8eaf0;
      --text-dim: #6b7194;
      --text-muted: #4a5070;
      --accent: #6c5ce7;
      --accent2: #a29bfe;
      --accent-glow: rgba(108,92,231,.25);
      --accent-hover: #7e71ea;
      --green: #00cec9;
      --green2: #55efc4;
      --green-bg: rgba(0,206,201,.1);
      --red: #ff6b6b;
      --red2: #ff8787;
      --red-bg: rgba(255,107,107,.1);
      --yellow: #feca57;
      --yellow-bg: rgba(254,202,87,.1);
      --blue: #74b9ff;
      --blue-bg: rgba(116,185,255,.1);
      --gradient-accent: linear-gradient(135deg, #6c5ce7, #a29bfe);
      --gradient-green: linear-gradient(135deg, #00cec9, #55efc4);
      --gradient-red: linear-gradient(135deg, #ff6b6b, #ff8787);
      --shadow-sm: 0 2px 8px rgba(0,0,0,.2);
      --shadow-md: 0 4px 24px rgba(0,0,0,.3);
      --shadow-lg: 0 8px 40px rgba(0,0,0,.4);
      --shadow-glow: 0 0 30px var(--accent-glow);
      --radius: 14px;
      --radius-sm: 10px;
      --radius-lg: 20px;
      --transition: .25s cubic-bezier(.4,0,.2,1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #root { min-height: 100vh; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

    /* ═══ AUTH PAGE ═══ */
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }
    .auth-page::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(108,92,231,.15) 0%, transparent 70%);
      top: -200px;
      right: -100px;
      animation: float 8s ease-in-out infinite;
    }
    .auth-page::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,206,201,.1) 0%, transparent 70%);
      bottom: -150px;
      left: -100px;
      animation: float 10s ease-in-out infinite reverse;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 44px;
      width: 420px;
      max-width: 92vw;
      position: relative;
      z-index: 1;
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow-lg), 0 0 60px rgba(108,92,231,.08);
      animation: cardEnter .6s cubic-bezier(.16,1,.3,1);
    }
    @keyframes cardEnter {
      from { opacity: 0; transform: translateY(24px) scale(.97); }
    }
    .auth-card .logo-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .auth-card .logo-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: var(--gradient-accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 4px 16px rgba(108,92,231,.3);
    }
    .auth-card h1 { font-size: 26px; font-weight: 800; letter-spacing: -.5px; }
    .auth-card .subtitle {
      color: var(--text-dim);
      margin-bottom: 32px;
      font-size: 14px;
      line-height: 1.5;
    }

    .input-group { margin-bottom: 18px; }
    .input-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .input-group input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: all var(--transition);
    }
    .input-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .input-group input::placeholder { color: var(--text-muted); }

    /* ═══ BUTTONS ═══ */
    .btn {
      padding: 11px 22px;
      border-radius: var(--radius-sm);
      border: none;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all var(--transition);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary {
      background: var(--gradient-accent);
      color: #fff;
      width: 100%;
      box-shadow: 0 4px 16px rgba(108,92,231,.25);
    }
    .btn-primary:hover { box-shadow: 0 6px 24px rgba(108,92,231,.35); transform: translateY(-1px); }
    .btn-google {
      background: #fff;
      color: #333;
      width: 100%;
      margin-bottom: 16px;
      font-weight: 600;
      box-shadow: var(--shadow-sm);
    }
    .btn-google:hover { background: #f8f8f8; box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .btn-sm { padding: 7px 16px; font-size: 13px; border-radius: 8px; }
    .btn-success { background: var(--gradient-green); color: #000; font-weight: 700; }
    .btn-success:hover { box-shadow: 0 4px 16px rgba(0,206,201,.3); }
    .btn-danger { background: var(--gradient-red); color: #fff; }
    .btn-danger:hover { box-shadow: 0 4px 16px rgba(255,107,107,.3); }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); background: rgba(108,92,231,.05); }
    .btn-ghost { background: transparent; color: var(--text-dim); padding: 6px; }
    .btn-ghost:hover { color: var(--text); background: var(--surface2); }

    .divider {
      text-align: center;
      margin: 24px 0;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      position: relative;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 38%;
      height: 1px;
      background: var(--border);
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .auth-toggle {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-dim);
    }
    .auth-toggle a {
      color: var(--accent2);
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
    }
    .auth-toggle a:hover { text-decoration: underline; }

    .error-msg {
      background: var(--red-bg);
      color: var(--red);
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-bottom: 18px;
      border: 1px solid rgba(255,107,107,.15);
      animation: shake .4s;
    }
    @keyframes shake {
      10%,90% { transform: translateX(-1px); }
      20%,80% { transform: translateX(2px); }
      30%,50%,70% { transform: translateX(-3px); }
      40%,60% { transform: translateX(3px); }
    }

    /* ═══ APP LAYOUT ═══ */
    .app-layout { display: flex; min-height: 100vh; }

    .sidebar {
      width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 0;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 50;
      transition: transform var(--transition);
    }

    .sidebar-brand {
      padding: 24px 24px 20px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-brand .brand-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .sidebar-brand .brand-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: var(--gradient-accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 2px 12px rgba(108,92,231,.3);
    }
    .sidebar-brand h2 { font-size: 17px; font-weight: 800; letter-spacing: -.3px; }
    .sidebar-brand .tagline {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
      padding-left: 50px;
    }

    .sidebar-nav { flex: 1; padding: 12px 0; }
    .nav-section-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 16px 24px 8px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 24px;
      margin: 2px 12px;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all var(--transition);
      border-radius: var(--radius-sm);
      position: relative;
    }
    .nav-item:hover { color: var(--text); background: var(--surface2); }
    .nav-item.active {
      color: #fff;
      background: var(--gradient-accent);
      box-shadow: 0 2px 12px rgba(108,92,231,.3);
    }
    .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      padding: 8px;
      border-radius: var(--radius-sm);
      transition: background var(--transition);
    }
    .user-info:hover { background: var(--surface2); }
    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--gradient-accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }
    .user-name { font-size: 13px; font-weight: 600; }
    .user-email { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

    .main-content {
      flex: 1;
      margin-left: 260px;
      padding: 28px 32px;
      overflow-y: auto;
      min-height: 100vh;
      background: var(--bg);
    }

    /* Mobile */
    .mobile-header {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      z-index: 40;
      padding: 0 16px;
      align-items: center;
      gap: 12px;
    }
    .hamburger {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--text);
    }
    .hamburger:hover { background: var(--surface2); }
    .hamburger svg { width: 20px; height: 20px; }
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 45;
      backdrop-filter: blur(4px);
    }

    @media (max-width: 860px) {
      .mobile-header { display: flex; }
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay.open { display: block; }
      .main-content { margin-left: 0; padding: 72px 16px 24px; }
      .content-grid { grid-template-columns: 1fr !important; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .page-header { flex-direction: column; align-items: flex-start !important; gap: 12px; }
      .page-header .search-wrapper { width: 100%; }
    }
    @media (max-width: 500px) {
      .stats-grid { grid-template-columns: 1fr; }
    }

    /* ═══ PAGE TRANSITIONS ═══ */
    .page-enter {
      animation: pageIn .35s cubic-bezier(.16,1,.3,1);
    }
    @keyframes pageIn {
      from { opacity: 0; transform: translateY(12px); }
    }

    /* ═══ DASHBOARD ═══ */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .page-header h2 {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -.5px;
    }
    .page-header .search-wrapper { width: 380px; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      transition: all var(--transition);
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      opacity: 0;
      transition: opacity var(--transition);
    }
    .stat-card:hover { border-color: var(--border-hover); transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .stat-card:hover::before { opacity: 1; }
    .stat-card:nth-child(1)::before { background: var(--gradient-accent); }
    .stat-card:nth-child(2)::before { background: var(--gradient-green); }
    .stat-card:nth-child(3)::before { background: linear-gradient(135deg, #74b9ff, #a29bfe); }
    .stat-card:nth-child(4)::before { background: linear-gradient(135deg, #feca57, #ff6b6b); }
    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .8px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .stat-value { font-size: 26px; font-weight: 800; letter-spacing: -.5px; }
    .stat-change {
      font-size: 13px;
      margin-top: 6px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 6px;
    }
    .stat-change.up { color: var(--green); background: var(--green-bg); }
    .stat-change.down { color: var(--red); background: var(--red-bg); }

    .content-grid {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 20px;
    }
    @media (max-width: 1200px) and (min-width: 861px) {
      .content-grid { grid-template-columns: 1fr 340px; }
    }

    /* ═══ CARDS ═══ */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color var(--transition);
    }
    .card:hover { border-color: var(--border-hover); }
    .card-header {
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-header h3 { font-size: 14px; font-weight: 700; letter-spacing: -.2px; }
    .card-body { padding: 22px; }

    /* ═══ CHART ═══ */
    .chart-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      gap: 12px;
      flex-wrap: wrap;
    }
    .chart-controls { display: flex; gap: 4px; }
    .chart-btn {
      padding: 5px 14px;
      border-radius: 8px;
      border: 1px solid transparent;
      background: var(--surface2);
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all var(--transition);
    }
    .chart-btn:hover { color: var(--text); background: var(--surface3); }
    .chart-btn.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 8px rgba(108,92,231,.3);
    }
    .chart-btn-indicator {
      padding: 5px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all var(--transition);
      text-transform: uppercase;
      letter-spacing: .3px;
    }
    .chart-btn-indicator:hover { color: var(--accent2); border-color: var(--accent); background: rgba(108,92,231,.06); }

    #chart-container { width: 100%; height: 380px; border-radius: 10px; overflow: hidden; }

    /* ═══ SEARCH ═══ */
    .search-box { position: relative; }
    .search-box input {
      width: 100%;
      padding: 11px 16px 11px 42px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: all var(--transition);
    }
    .search-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); background: var(--surface); }
    .search-box input::placeholder { color: var(--text-muted); }
    .search-box .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      width: 16px;
      height: 16px;
      transition: color var(--transition);
    }
    .search-box input:focus ~ .search-icon,
    .search-box:focus-within .search-icon { color: var(--accent); }
    .search-results {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      max-height: 260px;
      overflow-y: auto;
      z-index: 100;
      box-shadow: var(--shadow-lg);
      animation: dropdownIn .2s;
    }
    @keyframes dropdownIn { from { opacity: 0; transform: translateY(-6px); } }
    .search-result-item {
      padding: 12px 16px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      transition: background var(--transition);
    }
    .search-result-item:hover { background: var(--surface2); }
    .search-result-item:first-child { border-radius: 9px 9px 0 0; }
    .search-result-item:last-child { border-radius: 0 0 9px 9px; }
    .search-result-item .symbol { font-weight: 700; font-size: 14px; }
    .search-result-item .name { color: var(--text-dim); font-size: 12px; margin-top: 2px; }
    .search-result-item .result-arrow { color: var(--text-muted); font-size: 16px; }

    /* ═══ TRADE PANEL ═══ */
    .trade-tabs { display: flex; }
    .trade-tab {
      flex: 1;
      padding: 14px;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      background: none;
      border: none;
      color: var(--text-muted);
      transition: all var(--transition);
      position: relative;
    }
    .trade-tab::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 20%;
      right: 20%;
      height: 3px;
      border-radius: 3px 3px 0 0;
      background: transparent;
      transition: all var(--transition);
    }
    .trade-tab.active-buy { color: var(--green); }
    .trade-tab.active-buy::after { background: var(--green); left: 10%; right: 10%; }
    .trade-tab.active-sell { color: var(--red); }
    .trade-tab.active-sell::after { background: var(--red); left: 10%; right: 10%; }
    .trade-tab:hover { color: var(--text); }

    .trade-form { padding: 22px; }
    .trade-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      font-size: 14px;
    }
    .trade-row label { color: var(--text-dim); font-weight: 500; }
    .trade-input {
      width: 130px;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, createContext, useContext, useMemo } = React;

    // ═══════════════════════════════════════════════════════
    // CONFIGURATION
    // ═══════════════════════════════════════════════════════
    const FIREBASE_CONFIG = {
      apiKey: "YOUR_FIREBASE_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };
    const FINNHUB_API_KEY = "YOUR_FINNHUB_API_KEY";
    const STARTING_CASH = 100000;

    // ═══════════════════════════════════════════════════════
    // FIREBASE
    // ═══════════════════════════════════════════════════════
    let firebaseReady = false;
    try {
      if (FIREBASE_CONFIG.apiKey !== "YOUR_FIREBASE_API_KEY") {
        firebase.initializeApp(FIREBASE_CONFIG);
        firebaseReady = true;
      }
    } catch (e) { console.warn("Firebase init failed:", e); }
    const auth = firebaseReady ? firebase.auth() : null;
    const db = firebaseReady ? firebase.firestore() : null;

    // ═══════════════════════════════════════════════════════
    // STOCK API
    // ═══════════════════════════════════════════════════════
    const apiKey = FINNHUB_API_KEY !== "YOUR_FINNHUB_API_KEY" ? FINNHUB_API_KEY : null;

    async function searchSymbols(query) {
      if (!apiKey || !query) return [];
      try {
        const res = await fetch(`https://finnhub.io/api/v1/search?q=${encodeURIComponent(query)}&token=${apiKey}`);
        const data = await res.json();
        return (data.result || []).filter(r => r.type === "Common Stock" && !r.symbol.includes(".")).slice(0, 8);
      } catch { return []; }
    }

    async function getQuote(symbol) {
      if (!apiKey) {
        const base = ({ AAPL:189, MSFT:421, GOOGL:174, TSLA:248, AMZN:196 })[symbol] || (Math.random()*200+20);
        const change = (Math.random()-0.5)*6;
        return { c: base+change, h: base*1.02, l: base*0.98, o: base, pc: base, dp: (change/base)*100 };
      }
      try {
        const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${apiKey}`);
        return await res.json();
      } catch { return null; }
    }

    async function getCandles(symbol, resolution = "D", from, to) {
      if (!apiKey) {
        const candles = [];
        let price = ({ AAPL:189, MSFT:421, GOOGL:174, TSLA:248, AMZN:196 })[symbol] || 150;
        const now = Math.floor(Date.now()/1000);
        for (let i=90; i>=0; i--) {
          const t = now - i*86400;
          price += (Math.random()-0.48)*4;
          price = Math.max(20, price);
          candles.push({
            time: t,
            open: price+(Math.random()-.5)*2,
            high: price+Math.random()*3,
            low: price-Math.random()*3,
            close: price,
            volume: Math.floor(Math.random()*5000000+500000)
          });
        }
        return candles;
      }
      if (!from) { to = Math.floor(Date.now()/1000); from = to - 90*86400; }
      try {
        const res = await fetch(`https://finnhub.io/api/v1/stock/candle?symbol=${symbol}&resolution=${resolution}&from=${from}&to=${to}&token=${apiKey}`);
        const data = await res.json();
        if (data.s !== "ok") return [];
        return data.t.map((t,i) => ({ time:t, open:data.o[i], high:data.h[i], low:data.l[i], close:data.c[i], volume:data.v[i] }));
      } catch { return []; }
    }

    // ═══════════════════════════════════════════════════════
    // EDUCATION ENGINE
    // ═══════════════════════════════════════════════════════
    const EDUCATION_RULES = {
      pdt_warning: {
        id:"pdt_warning", title:"Pattern Day Trader (PDT) Rule", category:"REGULATION", icon:"warning", emoji:"\u26A0\uFE0F",
        description:"You've made {count} day trades in the last 5 business days. The PDT rule states that if you make 4 or more day trades within 5 business days AND your account has less than $25,000, your account will be flagged and restricted.",
        tip:"With your current balance of {balance}, you {status} meet the $25,000 threshold. {advice}",
        check:(p,trade,h) => {
          const ago = Date.now()-5*24*60*60*1000;
          const recent = h.filter(x => { if(x.timestamp<ago) return false; return h.find(y => y.symbol===x.symbol && y.side!==x.side && y.timestamp>=x.timestamp && y.timestamp-x.timestamp<24*60*60*1000); });
          const count = Math.floor(recent.length/2);
          if(count>=3) { const bal=p.cash+Object.values(p.positions).reduce((s,x)=>s+x.shares*x.currentPrice,0); return { trigger:true, data:{ count, balance:fmt(bal), status:bal>=25000?"DO":"DO NOT", advice:bal>=25000?"Since your account exceeds $25k, the PDT rule won't restrict you. But it's still wise to be intentional about day trading.":"Consider holding positions overnight or reducing trade frequency to avoid being flagged."}}; }
          return { trigger:false };
        }
      },
      position_size: {
        id:"position_size", title:"Position Sizing Warning", category:"RISK MANAGEMENT", icon:"warning", emoji:"\uD83D\uDCCA",
        description:"This trade would represent {pct}% of your total portfolio value. Professional traders typically risk no more than 1-2% of their portfolio on any single trade.",
        tip:"Consider reducing your position size. If losing this entire position would significantly impact your ability to trade, it's too large.",
        check:(p,trade) => {
          const total = p.cash+Object.values(p.positions).reduce((s,x)=>s+x.shares*x.currentPrice,0);
          const pct = (trade.shares*trade.price/total)*100;
          return pct>15 ? { trigger:true, data:{ pct:pct.toFixed(1) }} : { trigger:false };
        }
      },
      concentration_risk: {
        id:"concentration_risk", title:"Portfolio Concentration Risk", category:"RISK MANAGEMENT", icon:"warning", emoji:"\uD83C\uDFAF",
        description:"After this trade, {symbol} would represent {pct}% of your portfolio. High concentration in a single stock dramatically increases your risk.",
        tip:"Diversification is one of the most reliable ways to reduce portfolio risk. Consider spreading investments across different sectors.",
        check:(p,trade) => {
          if(trade.side!=="buy") return { trigger:false };
          const total = p.cash+Object.values(p.positions).reduce((s,x)=>s+x.shares*x.currentPrice,0);
          const existing = p.positions[trade.symbol]?.shares||0;
          const pct = ((existing+trade.shares)*trade.price/total)*100;
          return pct>25 ? { trigger:true, data:{ symbol:trade.symbol, pct:pct.toFixed(1) }} : { trigger:false };
        }
      },
      stop_loss_reminder: {
        id:"stop_loss_reminder", title:"Set a Stop-Loss Order", category:"RISK MANAGEMENT", icon:"info", emoji:"\uD83D\uDEE1\uFE0F",
        description:"You just bought {symbol}. Have you considered setting a stop-loss? A stop-loss automatically sells your position if the price drops to a specified level.",
        tip:"A common approach: set a stop-loss 5-10% below your entry price. For a $100 stock, a 7% stop-loss at $93 caps your loss at $7/share.",
        check:(p,trade) => trade.side==="buy" ? { trigger:true, data:{ symbol:trade.symbol }} : { trigger:false }
      },
      fomo_warning: {
        id:"fomo_warning", title:"Chasing a Hot Stock?", category:"BEHAVIORAL", icon:"warning", emoji:"\uD83D\uDD25",
        description:"{symbol} is up {pct}% today. Buying stocks that have already made large moves can be risky — this is often called 'chasing'.",
        tip:"Ask yourself: Would I buy this stock if it hadn't moved today? If the answer is no, you might be driven by FOMO. Consider waiting for a pullback.",
        check:(p,trade,h,quote) => {
          if(trade.side!=="buy"||!quote) return { trigger:false };
          const pct = quote.dp||((quote.c-quote.pc)/quote.pc*100);
          return pct>5 ? { trigger:true, data:{ symbol:trade.symbol, pct:pct.toFixed(1) }} : { trigger:false };
        }
      },
      selling_at_loss: {
        id:"selling_at_loss", title:"Selling at a Loss", category:"BEHAVIORAL", icon:"info", emoji:"\uD83E\uDD14",
        description:"You're about to sell {symbol} at a {pct}% loss. Make sure this is a deliberate decision and not panic selling.",
        tip:"Before selling: Is your original thesis still intact? Has something fundamentally changed? If the stock dropped on market-wide selling but the company is fine, selling might lock in an unnecessary loss.",
        check:(p,trade) => {
          if(trade.side!=="sell") return { trigger:false };
          const pos = p.positions[trade.symbol];
          if(!pos) return { trigger:false };
          const pct = ((trade.price-pos.avgCost)/pos.avgCost)*100;
          return pct<-3 ? { trigger:true, data:{ symbol:trade.symbol, pct:Math.abs(pct).toFixed(1) }} : { trigger:false };
        }
      },
      first_trade: {
        id:"first_trade", title:"Welcome to Paper Trading!", category:"GETTING STARTED", icon:"info", emoji:"\uD83C\uDF93",
        description:"This is your first trade — exciting! Paper trading lets you practice with fake money so you can learn without risk. Your starting balance is {balance}.",
        tip:"Start small! Even though it's fake money, treat it like real money to build good habits. Track why you're making each trade.",
        check:(p,trade,h) => h.length===0 ? { trigger:true, data:{ balance:fmt(STARTING_CASH) }} : { trigger:false }
      }
    };

    const INDICATOR_LESSONS = {

      macd: { title:"MACD (Moving Average Convergence Divergence)", description:"MACD shows the relationship between two moving averages. When the MACD line crosses above the signal line, it's often a bullish signal. When it crosses below, it's bearish.", tip:"Don't use MACD in isolation. Combine it with price action and other indicators for confirmation." },
      ma: { title:"Moving Averages (SMA & EMA)", description:"Moving averages smooth out price data to show trends. The 50-day and 200-day are most popular. When price is above the moving average, the trend is generally up.", tip:"The 'Golden Cross' (50-day crossing above 200-day) is a bullish signal. The 'Death Cross' is bearish." },
      vol: { title:"Volume Analysis", description:"Volume shows how many shares were traded. High volume on up days confirms bullish moves. High volume on down days confirms bearish pressure.", tip:"A breakout on high volume is more likely to sustain than one on low volume. Always check volume to confirm price moves." }
    };

    function checkEducationalRules(portfolio, trade, history, quote) {
      const dismissed = JSON.parse(localStorage.getItem("edu_dismissed") || "{}");
      const triggered = [];
      for (const [key, rule] of Object.entries(EDUCATION_RULES)) {
        if (dismissed[key]) continue;
        const result = rule.check(portfolio, trade, history, quote);
        if (result.trigger) triggered.push({ ...rule, data: result.data });
      }
      return triggered;
    }

    function ToastProvider({ children }) {
      const [toasts, setToasts] = useState([]);

        const id = Date.now();
        setToasts(prev => [...prev, { id, msg, type }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000);
      }, []);
      return (
        <ToastContext.Provider value={addToast}>
          {children}
          <div className="toast-container">
            {toasts.map(t => (
              <div key={t.id} className={`toast ${t.type}`}>
                <span>{t.type==="success"?"\u2705":t.type==="error"?"\u274C":t.type==="warning"?"\u26A0\uFE0F":"\u2139\uFE0F"}</span>
                <span>{t.msg}</span>

    // ═══════════════════════════════════════════════════════
    // PORTFOLIO PROVIDER
    // ═══════════════════════════════════════════════════════
    function PortfolioProvider({ children }) {
      const { user } = useContext(AuthContext);
      const [portfolio, setPortfolio] = useState(null);
      const [history, setHistory] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => { if (user) loadPortfolio(); }, [user]);

      const loadPortfolio = () => {
        const saved = localStorage.getItem(`portfolio_${user.uid}`);
        if (saved) { const d = JSON.parse(saved); setPortfolio(d.portfolio); setHistory(d.history||[]); }
        else { setPortfolio({ cash: STARTING_CASH, positions: {} }); setHistory([]); }
        setLoading(false);
      };
      const save = (p, h) => localStorage.setItem(`portfolio_${user.uid}`, JSON.stringify({ portfolio:p, history:h }));

      const executeTrade = (symbol, shares, price, side) => {
        setPortfolio(prev => {
          const next = { ...prev, positions: { ...prev.positions } };
          if (side === "buy") {
            next.cash -= shares*price;
            const ex = next.positions[symbol];
            if (ex) { const ts = ex.shares+shares; next.positions[symbol] = { shares:ts, avgCost:(ex.avgCost*ex.shares+price*shares)/ts, currentPrice:price }; }
            else { next.positions[symbol] = { shares, avgCost:price, currentPrice:price }; }
          } else {
            const ex = next.positions[symbol];
            if (ex) { next.cash += shares*price; const rem = ex.shares-shares; if (rem<=0) delete next.positions[symbol]; else next.positions[symbol] = { ...ex, shares:rem, currentPrice:price }; }
          }
          const newH = [...history, { symbol, shares, price, side, timestamp: Date.now() }];
          setHistory(newH);
          save(next, newH);
          return next;
        });
      };

      const updatePrice = (symbol, price) => {
        setPortfolio(prev => {
          if (!prev.positions[symbol]) return prev;
          const next = { ...prev, positions: { ...prev.positions } };
          next.positions[symbol] = { ...next.positions[symbol], currentPrice: price };
          return next;
        });
      };

      const resetPortfolio = () => { const p = { cash:STARTING_CASH, positions:{} }; setPortfolio(p); setHistory([]); save(p,[]); };

      if (loading) return null;
      return <PortfolioContext.Provider value={{ portfolio, history, executeTrade, updatePrice, resetPortfolio }}>{children}</PortfolioContext.Provider>;
    }

    // ═══════════════════════════════════════════════════════
    // STOCK CHART
    // ═══════════════════════════════════════════════════════
    function StockChart({ symbol }) {
      const chartRef = useRef(null);
      const chartInstance = useRef(null);
      const [resolution, setResolution] = useState("D");
      const [showIndicator, setShowIndicator] = useState(null);
      const [loading, setLoading] = useState(false);

      useEffect(() => {
        if (!chartRef.current || !symbol) return;
        loadChart();
        return () => { if (chartInstance.current) { chartInstance.current.remove(); chartInstance.current = null; }};
      }, [symbol, resolution]);

      const loadChart = async () => {
        setLoading(true);
        if (chartInstance.current) chartInstance.current.remove();
        const container = chartRef.current;
        const chart = LightweightCharts.createChart(container, {
          width: container.clientWidth, height: 380,
          layout: { background: { type:'solid', color:'#141720' }, textColor:'#6b7194', fontFamily:'Inter' },
          grid: { vertLines: { color:'#1e2235' }, horzLines: { color:'#1e2235' } },
          crosshair: { mode: LightweightCharts.CrosshairMode.Normal, vertLine: { color:'rgba(108,92,231,.4)' }, horzLine: { color:'rgba(108,92,231,.4)' } },
          rightPriceScale: { borderColor:'#1e2235' },
          timeScale: { borderColor:'#1e2235', timeVisible: resolution!=="D"&&resolution!=="W" },
        });
        chartInstance.current = chart;
        const candles = await getCandles(symbol, resolution);
        if (candles.length > 0) {
          const cs = chart.addCandlestickSeries({ upColor:'#00cec9', downColor:'#ff6b6b', borderUpColor:'#00cec9', borderDownColor:'#ff6b6b', wickUpColor:'#00cec9', wickDownColor:'#ff6b6b' });
          cs.setData(candles.map(c => ({ time:c.time, open:c.open, high:c.high, low:c.low, close:c.close })));
          if (candles.length >= 20) {
            const sma = []; for (let i=19;i<candles.length;i++) { const s = candles.slice(i-19,i+1).reduce((a,c)=>a+c.close,0); sma.push({ time:candles[i].time, value:s/20 }); }
            chart.addLineSeries({ color:'#a29bfe', lineWidth:1.5, crosshairMarkerVisible:false }).setData(sma);
          }
          const vol = chart.addHistogramSeries({ priceFormat:{type:'volume'}, priceScaleId:'' });
          chart.priceScale('').applyOptions({ scaleMargins:{ top:.82, bottom:0 }});
          vol.setData(candles.map(c => ({ time:c.time, value:c.volume, color:c.close>=c.open?'rgba(0,206,201,.2)':'rgba(255,107,107,.2)' })));
        }
        chart.timeScale().fitContent();
        const ro = new ResizeObserver(() => chart.applyOptions({ width:container.clientWidth }));
        ro.observe(container);
        setLoading(false);
      };

      return (
        <div>
          <div className="chart-toolbar">
            <div className="chart-controls">
              {["5","15","60","D","W"].map(r => (
                <button key={r} className={`chart-btn ${resolution===r?'active':''}`} onClick={()=>setResolution(r)}>{r==="60"?"1H":r}</button>
              ))}
            </div>
            <div className="chart-controls">
              {[["rsi","RSI"],["macd","MACD"],["ma","MA"],["vol","VOL"]].map(([k,label]) => (
                <button key={k} className="chart-btn-indicator" onClick={()=>setShowIndicator(k)}>{label}</button>
              ))}
            </div>
          </div>
          <div style={{position:'relative'}}>
            <div ref={chartRef} id="chart-container" />
            {loading && <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(20,23,32,.6)'}}><div className="spinner" style={{width:28,height:28}}/></div>}
          </div>
          {showIndicator && <IndicatorPopup indicator={showIndicator} onClose={()=>setShowIndicator(null)} />}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════
    // TRADE PANEL
    // ═══════════════════════════════════════════════════════
    function TradePanel({ symbol, quote }) {
      const { portfolio, history, executeTrade } = useContext(PortfolioContext);
      const addToast = useContext(ToastContext);
      const [side, setSide] = useState("buy");
      const [shares, setShares] = useState("");
      const [eduPopup, setEduPopup] = useState(null);
      const [pendingTrade, setPendingTrade] = useState(null);

      if (!symbol || !quote) return (
        <div className="card">
          <div className="card-header"><h3>Trade</h3></div>
          <div className="card-body">
            <div className="empty-state">
              <span className="empty-icon">{"\uD83D\uDD0D"}</span>
              <h4>No Stock Selected</h4>
              <p>Search for a stock or pick one from your watchlist to start trading</p>
            </div>
          </div>
        </div>
      );
      const price = quote.c || 0;
      const numShares = parseInt(shares) || 0;
      const total = numShares * price;
      const position = portfolio.positions[symbol];
      const maxBuy = Math.floor(portfolio.cash / price);
      const maxSell = position?.shares || 0;

      const handleTrade = () => {
        if (numShares <= 0) return addToast("Enter a valid number of shares", "error");
        if (side === "buy" && total > portfolio.cash) return addToast("Insufficient funds", "error");
        if (side === "sell" && numShares > maxSell) return addToast("You don't own enough shares", "error");
        const trade = { symbol, shares: numShares, price, side };
        const rules = checkEducationalRules(portfolio, trade, history, quote);
        if (rules.length > 0) { setEduPopup(rules[0]); setPendingTrade(trade); return; }
        finalize(trade);
      };
      const finalize = t => {
        executeTrade(t.symbol, t.shares, t.price, t.side);
        addToast(`${t.side==="buy"?"Bought":"Sold"} ${t.shares} shares of ${t.symbol} at ${fmt(t.price)}`, "success");
        setShares(""); setEduPopup(null); setPendingTrade(null);
      };
      const setMax = () => setShares(String(side==="buy"?maxBuy:maxSell));

      return (
        <div className="card">
          <div className="trade-tabs">
            <button className={`trade-tab ${side==="buy"?"active-buy":""}`} onClick={()=>setSide("buy")}>Buy</button>
            <button className={`trade-tab ${side==="sell"?"active-sell":""}`} onClick={()=>setSide("sell")}>Sell</button>
          </div>
          <div className="trade-form">
            <div className="trade-row"><label>Symbol</label><strong style={{fontSize:16}}>{symbol}</strong></div>
            <div className="trade-row"><label>Market Price</label><span style={{fontWeight:700,fontSize:16}}>{fmt(price)}</span></div>
            <div className="trade-row"><label>Shares</label><input className="trade-input" type="number" min="1" max={side==="buy"?maxBuy:maxSell} value={shares} onChange={e=>setShares(e.target.value)} placeholder="0" /></div>
            <div className="trade-max">Max: <span onClick={setMax}>{side==="buy"?maxBuy:maxSell} shares</span></div>
            <div className="trade-summary">
              <div className="trade-summary-row"><span>Estimated Total</span><span>{fmt(total)}</span></div>
              <div className="trade-summary-row"><span>Cash Available</span><span>{fmt(portfolio.cash)}</span></div>
              <div className="trade-summary-row"><span>{side==="buy"?"Remaining Cash":"Cash After Sale"}</span><span>{fmt(side==="buy"?portfolio.cash-total:portfolio.cash+total)}</span></div>
            </div>
            <button className={`btn ${side==="buy"?"btn-buy":"btn-sell"}`} onClick={handleTrade}>{side==="buy"?`Buy ${symbol}`:`Sell ${symbol}`}</button>
          </div>
          {eduPopup && <EducationalPopup rule={eduPopup} onClose={()=>{setEduPopup(null);setPendingTrade(null)}} onProceed={()=>finalize(pendingTrade)} />}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════
    // WATCHLIST
    // ═══════════════════════════════════════════════════════
    function Watchlist({ onSelect }) {
      const [items, setItems] = useState(() => {
        const s = localStorage.getItem("watchlist");
        return s ? JSON.parse(s) : [
          {symbol:"AAPL",name:"Apple Inc"},{symbol:"MSFT",name:"Microsoft"},{symbol:"GOOGL",name:"Alphabet"},{symbol:"TSLA",name:"Tesla"},{symbol:"AMZN",name:"Amazon"}
        ];
      });
      const [quotes, setQuotes] = useState({});
      const [addSym, setAddSym] = useState("");

      useEffect(() => {
        localStorage.setItem("watchlist", JSON.stringify(items));
        items.forEach(async item => { const q = await getQuote(item.symbol); if (q) setQuotes(prev => ({...prev, [item.symbol]: q})); });
      }, [items]);

      const handleAdd = async () => {
        const sym = addSym.toUpperCase().trim();
        if (!sym || items.find(i=>i.symbol===sym)) return;
        const results = await searchSymbols(sym);
        const match = results.find(r=>r.symbol===sym) || results[0];
        setItems(prev => [...prev, { symbol: match?match.symbol:sym, name: match?match.description:sym }]);
        setAddSym("");
      };

      return (
        <div className="card">
          <div className="card-header"><h3>Watchlist</h3><span style={{fontSize:12,color:'var(--text-muted)'}}>{items.length} stocks</span></div>
          <div className="card-body">
            {items.map(item => {
              const q = quotes[item.symbol];
              const change = q ? (q.dp || ((q.c-q.pc)/q.pc*100)) : 0;
              return (
                <div key={item.symbol} className="watchlist-item" onClick={()=>onSelect(item.symbol,item.name)}>
                  <div className="watchlist-left">
                    <div className="watchlist-avatar">{item.symbol.slice(0,2)}</div>
                    <div><div className="watchlist-ticker">{item.symbol}</div><div className="watchlist-name">{item.name}</div></div>
                  </div>
                  <div className="watchlist-price">
                    <div className="price">{q?fmt(q.c):"..."}</div>
                    <div className={`change ${change>=0?'pnl-positive':'pnl-negative'}`}>{fmtPct(change)}</div>
                  </div>
                </div>
              );
            })}
            <div className="watchlist-add">
              <input placeholder="Add symbol..." value={addSym} onChange={e=>setAddSym(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleAdd()} />
              <button className="btn btn-outline btn-sm" onClick={handleAdd}>+</button>
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════
    // DASHBOARD PAGE
    // ═══════════════════════════════════════════════════════
    function DashboardPage() {
      const { portfolio, history, updatePrice } = useContext(PortfolioContext);
      const [sym, setSym] = useState(null);
      const [name, setName] = useState("");
      const [quote, setQuote] = useState(null);

      const handleSelect = async (s, n) => {
        setSym(s); setName(n||s);
        const q = await getQuote(s);
        setQuote(q);
        if (q && portfolio.positions[s]) updatePrice(s, q.c);
      };

      const totalPos = Object.values(portfolio.positions).reduce((s,p)=>s+p.shares*p.currentPrice,0);
      const totalVal = portfolio.cash + totalPos;
      const pnl = totalVal - STARTING_CASH;
      const pnlPct = ((totalVal/STARTING_CASH)-1)*100;

      return (
        <div className="page-enter">
          <div className="page-header">
            <h2>Dashboard</h2>
            <div className="search-wrapper" style={{width:380}}><SearchBar onSelect={handleSelect} /></div>
          </div>

          <div className="stats-grid">
            <div className="stat-card">
              <div className="stat-label">Portfolio Value</div>
              <div className="stat-value">{fmt(totalVal)}</div>
              <div className={`stat-change ${pnl>=0?'up':'down'}`}>{pnl>=0?Icon.arrowUp:Icon.arrowDown} {fmtPct(pnlPct)}</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Cash Available</div>
              <div className="stat-value">{fmt(portfolio.cash)}</div>
              <div style={{fontSize:12,color:'var(--text-muted)',marginTop:6}}>{((portfolio.cash/totalVal)*100).toFixed(0)}% of portfolio</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Invested</div>
              <div className="stat-value">{fmt(totalPos)}</div>
              <div style={{fontSize:12,color:'var(--text-muted)',marginTop:6}}>{Object.keys(portfolio.positions).length} positions</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Total Trades</div>
              <div className="stat-value">{history.length}</div>
              <div style={{fontSize:12,color:'var(--text-muted)',marginTop:6}}>{history.filter(h=>h.side==='buy').length} buys, {history.filter(h=>h.side==='sell').length} sells</div>
            </div>
          </div>

          <div className="content-grid">
            <div>
              <div className="card" style={{marginBottom:20}}>
                <div className="card-header">
                  <h3>{sym ? `${sym} \u2014 ${name}` : "Select a Stock"}</h3>
                  {quote && (
                    <div style={{display:'flex',alignItems:'center',gap:14}}>
                      <span style={{fontSize:22,fontWeight:800}}>{fmt(quote.c)}</span>
                      <span className={`pnl-badge ${(quote.dp||0)>=0?'positive':'negative'}`}>{fmtPct(quote.dp||0)}</span>
                    </div>
                  )}
                </div>
                <div className="card-body">
                  {sym ? <StockChart symbol={sym} /> : (
                    <div className="empty-state">
                      <span className="empty-icon">{"\uD83D\uDCC8"}</span>
                      <h4>Ready to Trade</h4>
                      <p>Search for a stock above or click one from your watchlist to get started</p>
                    </div>
                  )}
                </div>
              </div>
              <Watchlist onSelect={handleSelect} />
            </div>
            <div><TradePanel symbol={sym} quote={quote} /></div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════
    // PORTFOLIO PAGE
    // ═══════════════════════════════════════════════════════
    function PortfolioPage() {
      const { portfolio, history, resetPortfolio } = useContext(PortfolioContext);
      const addToast = useContext(ToastContext);
      const positions = Object.entries(portfolio.positions);
      const totalPos = positions.reduce((s,[,p])=>s+p.shares*p.currentPrice,0);
      const totalVal = portfolio.cash + totalPos;

      return (
        <div className="page-enter">
          <div className="page-header">
            <h2>Portfolio</h2>
            <button className="btn btn-outline btn-sm" onClick={()=>{resetPortfolio();addToast("Portfolio reset to $100,000","info")}}>Reset Portfolio</button>
          </div>

          <div className="stats-grid">
            <div className="stat-card"><div className="stat-label">Total Value</div><div className="stat-value">{fmt(totalVal)}</div></div>
            <div className="stat-card"><div className="stat-label">Cash</div><div className="stat-value">{fmt(portfolio.cash)}</div></div>
            <div className="stat-card"><div className="stat-label">Invested</div><div className="stat-value">{fmt(totalPos)}</div></div>
            <div className="stat-card">
              <div className="stat-label">Total P&L</div>
              <div className="stat-value" style={{color:totalVal>=STARTING_CASH?'var(--green)':'var(--red)'}}>{fmt(totalVal-STARTING_CASH)}</div>
            </div>
          </div>

          <div className="card" style={{marginBottom:20}}>
            <div className="card-header"><h3>Open Positions</h3><span style={{fontSize:12,color:'var(--text-muted)'}}>{positions.length} stocks</span></div>
            <div className="card-body" style={{padding:0,overflowX:'auto'}}>
              {positions.length === 0 ? (
                <div className="empty-state"><span className="empty-icon">{"\uD83D\uDCBC"}</span><h4>No Open Positions</h4><p>Head to the Dashboard to make your first trade!</p></div>
              ) : (
                <table className="positions-table">
                  <thead><tr><th>Symbol</th><th>Shares</th><th>Avg Cost</th><th>Current</th><th>Value</th><th>P&L</th><th>Return</th></tr></thead>
                  <tbody>
                    {positions.map(([sym, pos]) => {
                      const pnl = (pos.currentPrice-pos.avgCost)*pos.shares;
                      const pnlPct = ((pos.currentPrice/pos.avgCost)-1)*100;
                      return (
                        <tr key={sym}>
                          <td><div className="ticker"><div className="ticker-badge">{sym.slice(0,2)}</div>{sym}</div></td>
                          <td>{pos.shares}</td>
                          <td>{fmt(pos.avgCost)}</td>
                          <td style={{fontWeight:600}}>{fmt(pos.currentPrice)}</td>
                          <td style={{fontWeight:600}}>{fmt(pos.shares*pos.currentPrice)}</td>
                          <td className={pnl>=0?'pnl-positive':'pnl-negative'} style={{fontWeight:600}}>{fmt(pnl)}</td>
                          <td><span className={`pnl-badge ${pnlPct>=0?'positive':'negative'}`}>{fmtPct(pnlPct)}</span></td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              )}
            </div>
          </div>

          <div className="card">
            <div className="card-header"><h3>Trade History</h3><span style={{fontSize:12,color:'var(--text-muted)'}}>{history.length} trades</span></div>
            <div className="card-body">
              {history.length === 0 ? (
                <div className="empty-state"><span className="empty-icon">{"\uD83D\uDCDD"}</span><h4>No Trades Yet</h4><p>Your trade history will appear here</p></div>
              ) : (
                [...history].reverse().slice(0,50).map((h,i) => (
                  <div key={i} className="history-item">
                    <div style={{display:'flex',alignItems:'center',gap:12}}>
                      <span className={`history-badge ${h.side}`}>{h.side}</span>
                      <strong>{h.symbol}</strong>
                      <span style={{color:'var(--text-muted)'}}>{h.shares} shares @ {fmt(h.price)}</span>
                    </div>
                    <div style={{color:'var(--text-muted)',fontSize:12,fontWeight:500}}>{new Date(h.timestamp).toLocaleString()}</div>
                  </div>
                ))
              )}
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════
    // LEARN PAGE
    // ═══════════════════════════════════════════════════════
    function LearnPage() {
      const [active, setActive] = useState(null);
      const lessons = [
        { icon:"\uD83C\uDF31", title:"What is the Stock Market?", level:"beginner", content:"The stock market is a marketplace where shares of publicly traded companies are bought and sold. When you buy a share, you own a tiny piece of that company. The price of a share is determined by supply and demand \u2014 if more people want to buy than sell, the price goes up, and vice versa.\n\nKey exchanges include the NYSE (New York Stock Exchange) and NASDAQ. Companies list their shares on these exchanges through an IPO (Initial Public Offering)." },
        { icon:"\uD83D\uDCB0", title:"Types of Orders", level:"beginner", content:"Market Order: Buys/sells immediately at the current price. Fast execution but you might not get the exact price you see.\n\nLimit Order: Sets a maximum buy price or minimum sell price. Guarantees your price but might not execute if the market doesn't reach your level.\n\nStop-Loss Order: Automatically sells when a stock drops to a certain price. Essential for managing risk.\n\nStop-Limit Order: Combines stop-loss and limit order features. Activates at one price, executes at another." },
        { icon:"\u26A0\uFE0F", title:"Pattern Day Trader Rule", level:"beginner", content:"The PDT rule is a FINRA regulation that applies to margin accounts. If you make 4 or more day trades (buy and sell the same stock on the same day) within 5 business days, and these trades represent more than 6% of your total trading activity, your account gets flagged.\n\nOnce flagged, you need to maintain at least $25,000 in your account to continue day trading. If your balance drops below $25k, you'll be restricted to closing trades only for 90 days.\n\nStrategies to manage this: Hold positions overnight, use a cash account (no PDT but slower settlement), or ensure your balance stays above $25k." },
        { icon:"\uD83D\uDEE1\uFE0F", title:"Risk Management", level:"intermediate", content:"The 1% Rule: Never risk more than 1% of your total portfolio on a single trade. With a $100k account, your maximum loss per trade should be $1,000.\n\nPosition Sizing: Calculate your position size based on your stop-loss distance and risk tolerance. Position Size = Risk Amount / (Entry Price - Stop-Loss Price).\n\nDiversification: Don't put all your eggs in one basket. Spread across different sectors (tech, healthcare, energy, etc.) and asset types.\n\nRisk/Reward Ratio: Aim for at least 2:1 \u2014 your potential profit should be at least twice your potential loss." },
        { icon:"\uD83D\uDCC8", title:"Technical Analysis Basics", level:"intermediate", content:"Support & Resistance: Price levels where stocks tend to reverse. Support is a floor (buying pressure), resistance is a ceiling (selling pressure).\n\nMoving Averages: The 50-day and 200-day SMAs are key levels. \u2018Golden Cross\u2019 (50 crosses above 200) = bullish. \u2018Death Cross\u2019 = bearish.\n\nRSI (0-100): Above 70 = overbought (may drop). Below 30 = oversold (may rise). Best in range-bound markets.\n\nMACD: Shows trend momentum. Signal line crossovers indicate potential buy/sell opportunities.\n\nVolume: Confirms price moves. High volume = strong conviction. Low volume = weak, potentially reversible." },
        { icon:"\uD83E\uDDE0", title:"Trading Psychology", level:"intermediate", content:"FOMO (Fear Of Missing Out): The urge to buy a stock because it's going up. This often leads to buying at the top. Stick to your plan.\n\nLoss Aversion: People feel losses twice as strongly as gains. This leads to holding losers too long and selling winners too quickly.\n\nConfirmation Bias: Seeking information that supports your position while ignoring contradictory evidence. Always consider the bear case.\n\nRevenge Trading: Making impulsive trades to recover losses. Take a break after a losing streak.\n\nOvertrading: Making too many trades chasing action. Quality over quantity. The best traders often wait patiently for ideal setups." },
        { icon:"\uD83D\uDCC5", title:"Day Trading Strategies", level:"advanced", content:"Scalping: Making dozens of trades per day for tiny profits. Requires very tight spreads, fast execution, and discipline.\n\nMomentum Trading: Riding stocks with significant volume and price movement. Look for catalysts (earnings, news) that drive sharp moves.\n\nBreakout Trading: Entering when price breaks above resistance or below support on high volume. Key: wait for confirmation before entering.\n\nReversal Trading: Betting that an overextended move will reverse. Higher risk but can be very profitable. Use RSI and candlestick patterns.\n\nGap Trading: Trading stocks that open significantly higher or lower than the previous close." },
        { icon:"\uD83D\uDCCA", title:"Reading Financial Statements", level:"advanced", content:"Income Statement: Revenue, expenses, and profit. Look for consistent revenue growth and improving margins. EPS (Earnings Per Share) is key.\n\nBalance Sheet: Assets, liabilities, and equity. Check debt-to-equity ratio. High debt can be risky during downturns.\n\nCash Flow Statement: How cash moves in/out. Free Cash Flow (FCF) is arguably the most important metric \u2014 it's harder to manipulate than earnings.\n\nP/E Ratio: Price divided by earnings. Compare to industry averages. High P/E may mean overvalued or high growth expectations.\n\nPEG Ratio: P/E divided by growth rate. PEG of 1 = fairly valued. Below 1 = potentially undervalued." },
      ];

      if (active !== null) {
        const l = lessons[active];
        return (
          <div className="page-enter lesson-detail">
            <button className="back-btn" onClick={()=>setActive(null)}>{Icon.back} Back to Lessons</button>
            <div className="card">
              <div className="card-header">
                <h3><span style={{marginRight:10}}>{l.icon}</span>{l.title}</h3>
                <span className={`lesson-tag ${l.level}`}>{l.level}</span>
              </div>
              <div className="card-body">{l.content.split("\n\n").map((p,i) => <p key={i}>{p}</p>)}</div>
            </div>
          </div>
        );
      }

      return (
        <div className="page-enter">
          <div className="page-header" style={{flexDirection:'column',alignItems:'flex-start'}}>
            <h2>Learn to Trade</h2>
            <p style={{color:'var(--text-dim)',fontSize:14,marginTop:4}}>Build your trading knowledge from the ground up</p>
          </div>
          <div className="lesson-grid">
            {lessons.map((l,i) => (
              <div key={i} className="lesson-card" onClick={()=>setActive(i)}>
                <span className="lesson-icon">{l.icon}</span>
                <h3>{l.title}</h3>
                <p>{l.content.substring(0,120)}...</p>
                <span className={`lesson-tag ${l.level}`}>{l.level}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════
    // MAIN APP SHELL
    // ═══════════════════════════════════════════════════════
    function AppShell() {
      const { user, logout } = useContext(AuthContext);
      const [page, setPage] = useState("dashboard");
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const needsConfig = FIREBASE_CONFIG.apiKey==="YOUR_FIREBASE_API_KEY" || FINNHUB_API_KEY==="YOUR_FINNHUB_API_KEY";

      const navigate = p => { setPage(p); setSidebarOpen(false); };

      return (
        <div className="app-layout">
          {/* Mobile header */}
          <div className="mobile-header">
            <button className="hamburger" onClick={()=>setSidebarOpen(!sidebarOpen)}>{Icon.menu}</button>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <div style={{width:28,height:28,borderRadius:8,background:'var(--gradient-accent)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>{"\uD83D\uDCC8"}</div>
              <span style={{fontWeight:700,fontSize:15}}>PaperTrader</span>
            </div>
          </div>

          {/* Overlay */}
          <div className={`sidebar-overlay ${sidebarOpen?'open':''}`} onClick={()=>setSidebarOpen(false)} />

          {/* Sidebar */}
          <div className={`sidebar ${sidebarOpen?'open':''}`}>
            <div className="sidebar-brand">
              <div className="brand-row">
                <div className="brand-icon">{"\uD83D\uDCC8"}</div>
                <h2>PaperTrader</h2>
              </div>
              <div className="tagline">Learn to trade, risk-free</div>
            </div>
            <div className="sidebar-nav">
              <div className="nav-section-label">Trading</div>
              <div className={`nav-item ${page==="dashboard"?"active":""}`} onClick={()=>navigate("dashboard")}>{Icon.dashboard} Dashboard</div>
              <div className={`nav-item ${page==="portfolio"?"active":""}`} onClick={()=>navigate("portfolio")}>{Icon.portfolio} Portfolio</div>
              <div className="nav-section-label">Education</div>
              <div className={`nav-item ${page==="learn"?"active":""}`} onClick={()=>navigate("learn")}>{Icon.learn} Learn</div>
            </div>
            <div className="sidebar-footer">
              <div className="user-info">
                <div className="user-avatar">{(user.displayName||user.email||"U")[0].toUpperCase()}</div>
                <div style={{minWidth:0}}>
                  <div className="user-name">{user.displayName||"Trader"}</div>
                  <div className="user-email" style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user.email}</div>
                </div>
              </div>
              <button className="btn btn-outline btn-sm" style={{width:'100%'}} onClick={logout}>{Icon.logout} Sign Out</button>
            </div>
          </div>

          <div className="main-content">
            {needsConfig && (
              <div className="config-banner">
                <span className="banner-icon">{"\u2728"}</span>
                <span>Running in <strong>demo mode</strong> \u2014 add your Firebase & Finnhub API keys in the source to enable real data and authentication</span>
              </div>
            )}
            {page==="dashboard" && <DashboardPage />}
            {page==="portfolio" && <PortfolioPage />}
            {page==="learn" && <LearnPage />}
          </div>
        </div>
      );
    }

    function App() {
      return (
        <ToastProvider>
          <AuthProvider>
            <AuthContext.Consumer>
              {({ user }) => user ? <PortfolioProvider><AppShell /></PortfolioProvider> : <LoginPage />}
            </AuthContext.Consumer>
          </AuthProvider>
        </ToastProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
