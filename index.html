<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PaperTrader — Learn to Trade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- React -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

  <!-- Firebase 10 (compat for simplicity) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <!-- Lightweight chart library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lightweight-charts/4.1.1/lightweight-charts.standalone.production.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #242836;
      --border: #2e3348;
      --text: #e4e6f0;
      --text-dim: #8b8fa3;
      --accent: #6c5ce7;
      --accent-hover: #7e71ea;
      --green: #00b894;
      --green-bg: rgba(0,184,148,.12);
      --red: #e74c3c;
      --red-bg: rgba(231,76,60,.12);
      --yellow: #fdcb6e;
      --yellow-bg: rgba(253,203,110,.12);
      --blue: #74b9ff;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    #root { min-height: 100vh; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Auth Page */
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f1117 0%, #1a1d27 50%, #0f1117 100%);
    }
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 400px;
      max-width: 90vw;
    }
    .auth-card h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .auth-card .subtitle { color: var(--text-dim); margin-bottom: 32px; font-size: 14px; }
    .auth-card .logo { font-size: 36px; margin-bottom: 16px; display: block; }

    .input-group { margin-bottom: 16px; }
    .input-group label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 6px; }
    .input-group input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    .input-group input:focus { border-color: var(--accent); }

    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary { background: var(--accent); color: #fff; width: 100%; justify-content: center; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-google {
      background: #fff;
      color: #333;
      width: 100%;
      justify-content: center;
      margin-bottom: 16px;
    }
    .btn-google:hover { background: #f0f0f0; }
    .btn-sm { padding: 6px 14px; font-size: 13px; }
    .btn-success { background: var(--green); color: #fff; }
    .btn-success:hover { opacity: .9; }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-danger:hover { opacity: .9; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

    .divider {
      text-align: center;
      margin: 20px 0;
      color: var(--text-dim);
      font-size: 13px;
      position: relative;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: var(--border);
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .auth-toggle {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-dim);
    }
    .auth-toggle a {
      color: var(--accent);
      cursor: pointer;
      text-decoration: none;
    }
    .auth-toggle a:hover { text-decoration: underline; }

    .error-msg {
      background: var(--red-bg);
      color: var(--red);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
    }

    /* Layout */
    .app-layout { display: flex; min-height: 100vh; }
    .sidebar {
      width: 240px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px 0;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-brand {
      padding: 0 20px 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 12px;
    }
    .sidebar-brand h2 { font-size: 18px; font-weight: 700; }
    .sidebar-brand span { font-size: 12px; color: var(--text-dim); }

    .sidebar-nav { flex: 1; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 14px;
      transition: all .2s;
      border-left: 3px solid transparent;
    }
    .nav-item:hover { color: var(--text); background: var(--surface2); }
    .nav-item.active {
      color: var(--accent);
      background: rgba(108,92,231,.08);
      border-left-color: var(--accent);
    }
    .nav-item svg { width: 18px; height: 18px; }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
    }
    .user-info { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
    }
    .user-name { font-size: 13px; font-weight: 500; }
    .user-email { font-size: 11px; color: var(--text-dim); }

    .main-content {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      max-height: 100vh;
    }

    /* Dashboard */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .stat-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
    .stat-value { font-size: 24px; font-weight: 700; }
    .stat-change { font-size: 13px; margin-top: 4px; }
    .stat-change.up { color: var(--green); }
    .stat-change.down { color: var(--red); }

    .content-grid {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 20px;
    }
    @media (max-width: 1100px) {
      .content-grid { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-header h3 { font-size: 15px; font-weight: 600; }
    .card-body { padding: 20px; }

    /* Chart */
    .chart-controls {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    .chart-btn {
      padding: 4px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-size: 12px;
      cursor: pointer;
    }
    .chart-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    #chart-container { width: 100%; height: 350px; border-radius: 8px; overflow: hidden; }

    /* Search */
    .search-box {
      position: relative;
      margin-bottom: 16px;
    }
    .search-box input {
      width: 100%;
      padding: 10px 14px 10px 38px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    .search-box input:focus { border-color: var(--accent); }
    .search-box svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      width: 16px;
      height: 16px;
    }
    .search-results {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      max-height: 240px;
      overflow-y: auto;
      z-index: 100;
      margin-top: 4px;
    }
    .search-result-item {
      padding: 10px 14px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      font-size: 14px;
    }
    .search-result-item:hover { background: var(--surface2); }
    .search-result-item .symbol { font-weight: 600; }
    .search-result-item .name { color: var(--text-dim); font-size: 12px; }

    /* Trade Panel */
    .trade-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .trade-tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: none;
      border: none;
      color: var(--text-dim);
      border-bottom: 2px solid transparent;
    }
    .trade-tab.active-buy { color: var(--green); border-bottom-color: var(--green); }
    .trade-tab.active-sell { color: var(--red); border-bottom-color: var(--red); }

    .trade-form { padding: 20px; }
    .trade-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 14px;
    }
    .trade-row label { color: var(--text-dim); }
    .trade-input {
      width: 120px;
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
      text-align: right;
      outline: none;
    }
    .trade-input:focus { border-color: var(--accent); }
    .trade-summary {
      background: var(--bg);
      border-radius: 8px;
      padding: 14px;
      margin: 16px 0;
      font-size: 13px;
    }
    .trade-summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .trade-summary-row:last-child { margin-bottom: 0; font-weight: 600; }

    .btn-buy { background: var(--green); color: #fff; width: 100%; justify-content: center; }
    .btn-buy:hover { filter: brightness(1.1); }
    .btn-sell { background: var(--red); color: #fff; width: 100%; justify-content: center; }
    .btn-sell:hover { filter: brightness(1.1); }

    /* Portfolio */
    .positions-table { width: 100%; }
    .positions-table th {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--text-dim);
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }
    .positions-table td {
      padding: 12px;
      font-size: 14px;
      border-bottom: 1px solid var(--border);
    }
    .positions-table tr:last-child td { border-bottom: none; }
    .positions-table .ticker { font-weight: 600; }

    .pnl-positive { color: var(--green); }
    .pnl-negative { color: var(--red); }

    /* Watchlist */
    .watchlist-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .watchlist-item:last-child { border-bottom: none; }
    .watchlist-item:hover { opacity: .85; }
    .watchlist-ticker { font-weight: 600; font-size: 14px; }
    .watchlist-name { font-size: 11px; color: var(--text-dim); }
    .watchlist-price { text-align: right; }
    .watchlist-price .price { font-weight: 600; font-size: 14px; }
    .watchlist-price .change { font-size: 12px; }

    .watchlist-add {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .watchlist-add input {
      flex: 1;
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      outline: none;
    }

    /* Education popup */
    .edu-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn .2s;
    }
    @keyframes fadeIn { from { opacity: 0; } }

    .edu-popup {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 500px;
      max-width: 90vw;
      max-height: 80vh;
      overflow-y: auto;
      animation: slideUp .3s;
    }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } }

    .edu-popup-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .edu-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .edu-icon.warning { background: var(--yellow-bg); }
    .edu-icon.info { background: rgba(116,185,255,.12); }
    .edu-icon.danger { background: var(--red-bg); }
    .edu-popup-header h3 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .edu-popup-header .edu-category { font-size: 12px; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }

    .edu-popup-body { padding: 20px 24px; }
    .edu-popup-body p { font-size: 14px; line-height: 1.7; color: var(--text); margin-bottom: 14px; }
    .edu-popup-body .edu-tip {
      background: var(--bg);
      border-left: 3px solid var(--accent);
      padding: 12px 16px;
      border-radius: 0 8px 8px 0;
      margin: 14px 0;
      font-size: 13px;
      line-height: 1.6;
    }

    .edu-popup-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .edu-dont-show { font-size: 12px; color: var(--text-dim); display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .edu-dont-show input { accent-color: var(--accent); }

    /* Trade History */
    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .history-item:last-child { border-bottom: none; }
    .history-badge {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .history-badge.buy { background: var(--green-bg); color: var(--green); }
    .history-badge.sell { background: var(--red-bg); color: var(--red); }

    /* Learn page */
    .lesson-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .lesson-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      cursor: pointer;
      transition: all .2s;
    }
    .lesson-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .lesson-card .lesson-icon { font-size: 28px; margin-bottom: 12px; }
    .lesson-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
    .lesson-card p { font-size: 13px; color: var(--text-dim); line-height: 1.5; }
    .lesson-card .lesson-tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      margin-top: 12px;
    }
    .lesson-tag.beginner { background: var(--green-bg); color: var(--green); }
    .lesson-tag.intermediate { background: var(--yellow-bg); color: var(--yellow); }
    .lesson-tag.advanced { background: var(--red-bg); color: var(--red); }

    /* Toast */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .toast {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      min-width: 280px;
      animation: slideIn .3s;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 13px;
    }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } }
    .toast.success { border-left: 3px solid var(--green); }
    .toast.error { border-left: 3px solid var(--red); }
    .toast.warning { border-left: 3px solid var(--yellow); }
    .toast.info { border-left: 3px solid var(--blue); }

    /* Loading */
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-dim);
    }
    .empty-state .emoji { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* Config banner */
    .config-banner {
      background: var(--yellow-bg);
      color: var(--yellow);
      padding: 12px 20px;
      text-align: center;
      font-size: 13px;
      border-bottom: 1px solid rgba(253,203,110,.3);
    }
    .config-banner a { color: var(--yellow); font-weight: 600; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, createContext, useContext } = React;

    // ═══════════════════════════════════════════════════════
    // CONFIGURATION — Replace with your own keys
    // ═══════════════════════════════════════════════════════
    const FIREBASE_CONFIG = {
      apiKey: "YOUR_FIREBASE_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    // Get a free key at https://finnhub.io/register
    const FINNHUB_API_KEY = "YOUR_FINNHUB_API_KEY";

    const STARTING_CASH = 100000; // $100k starting paper money

    // ═══════════════════════════════════════════════════════
    // FIREBASE INIT
    // ═══════════════════════════════════════════════════════
    let firebaseReady = false;
    try {
      if (FIREBASE_CONFIG.apiKey !== "YOUR_FIREBASE_API_KEY") {
        firebase.initializeApp(FIREBASE_CONFIG);
        firebaseReady = true;
      }
    } catch (e) {
      console.warn("Firebase init failed:", e);
    }
    const auth = firebaseReady ? firebase.auth() : null;
    const db = firebaseReady ? firebase.firestore() : null;

    // ═══════════════════════════════════════════════════════
    // STOCK DATA SERVICE (Finnhub)
    // ═══════════════════════════════════════════════════════
    const finnhubApiKey = FINNHUB_API_KEY !== "YOUR_FINNHUB_API_KEY" ? FINNHUB_API_KEY : null;

    async function searchSymbols(query) {
      if (!finnhubApiKey || !query) return [];
      try {
        const res = await fetch(`https://finnhub.io/api/v1/search?q=${encodeURIComponent(query)}&token=${finnhubApiKey}`);
        const data = await res.json();
        return (data.result || [])
          .filter(r => r.type === "Common Stock" && !r.symbol.includes("."))
          .slice(0, 8);
      } catch { return []; }
    }

    async function getQuote(symbol) {
      if (!finnhubApiKey) {
        // Demo data
        const base = Math.random() * 200 + 20;
        return { c: base, h: base*1.02, l: base*0.98, o: base*1.01, pc: base*0.99, dp: (Math.random()-0.5)*4 };
      }
      try {
        const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${finnhubApiKey}`);
        return await res.json();
      } catch { return null; }
    }

    async function getCandles(symbol, resolution = "D", from, to) {
      if (!finnhubApiKey) {
        // Generate demo candle data
        const candles = [];
        let price = 150;
        const now = Math.floor(Date.now() / 1000);
        for (let i = 90; i >= 0; i--) {
          const t = now - i * 86400;
          price += (Math.random() - 0.48) * 4;
          price = Math.max(20, price);
          candles.push({
            time: t,
            open: price + (Math.random()-0.5)*2,
            high: price + Math.random()*3,
            low: price - Math.random()*3,
            close: price,
            volume: Math.floor(Math.random()*5000000)
          });
        }
        return candles;
      }
      if (!from) { to = Math.floor(Date.now()/1000); from = to - 90*86400; }
      try {
        const res = await fetch(`https://finnhub.io/api/v1/stock/candle?symbol=${symbol}&resolution=${resolution}&from=${from}&to=${to}&token=${finnhubApiKey}`);
        const data = await res.json();
        if (data.s !== "ok") return [];
        return data.t.map((t, i) => ({
          time: t, open: data.o[i], high: data.h[i], low: data.l[i], close: data.c[i], volume: data.v[i]
        }));
      } catch { return []; }
    }

    function formatMoney(n) {
      return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(n);
    }
    function formatPct(n) {
      const sign = n >= 0 ? '+' : '';
      return `${sign}${n.toFixed(2)}%`;
    }
    function formatNum(n) {
      if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
      if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
      if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
      return n.toString();
    }

        const id = Date.now();
        setToasts(prev => [...prev, { id, msg, type }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000);
      }, []);
      return (
        <ToastContext.Provider value={addToast}>
          {children}
          <div className="toast-container">
            {toasts.map(t => (
              <div key={t.id} className={`toast ${t.type}`}>
                <span>{t.type === "success" ? "\u2705" : t.type === "error" ? "\u274C" : t.type === "warning" ? "\u26A0\uFE0F" : "\u2139\uFE0F"}</span>

              </div>
            ))}
          </div>
        </ToastContext.Provider>

    // ═══════════════════════════════════════════════════════
    // PORTFOLIO PROVIDER
    // ═══════════════════════════════════════════════════════
    function PortfolioProvider({ children }) {
      const { user } = useContext(AuthContext);
      const [portfolio, setPortfolio] = useState(null);
      const [history, setHistory] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        if (!user) return;
        loadPortfolio();
      }, [user]);

      const loadPortfolio = async () => {
        const key = `portfolio_${user.uid}`;
        const saved = localStorage.getItem(key);
        if (saved) {
          const data = JSON.parse(saved);
          setPortfolio(data.portfolio);
          setHistory(data.history || []);
        } else {
          setPortfolio({ cash: STARTING_CASH, positions: {} });
          setHistory([]);
        }
        setLoading(false);
      };

      const save = (p, h) => {
        const key = `portfolio_${user.uid}`;
        localStorage.setItem(key, JSON.stringify({ portfolio: p, history: h }));
      };

      const executeTrade = (symbol, shares, price, side) => {
        setPortfolio(prev => {
          const next = { ...prev, positions: { ...prev.positions } };
          if (side === "buy") {
            const cost = shares * price;
            next.cash -= cost;
            const existing = next.positions[symbol];
            if (existing) {
              const totalShares = existing.shares + shares;
              const totalCost = existing.avgCost * existing.shares + price * shares;
              next.positions[symbol] = { shares: totalShares, avgCost: totalCost / totalShares, currentPrice: price };
            } else {
              next.positions[symbol] = { shares, avgCost: price, currentPrice: price };
            }
          } else {
            const existing = next.positions[symbol];
            if (existing) {
              next.cash += shares * price;
              const remainingShares = existing.shares - shares;
              if (remainingShares <= 0) {
                delete next.positions[symbol];
              } else {
                next.positions[symbol] = { ...existing, shares: remainingShares, currentPrice: price };
              }
            }
          }
          const newTrade = { symbol, shares, price, side, timestamp: Date.now() };
          const newHistory = [...history, newTrade];
          setHistory(newHistory);
          save(next, newHistory);
          return next;
        });
      };

      const updatePrice = (symbol, price) => {
        setPortfolio(prev => {
          if (!prev.positions[symbol]) return prev;
          const next = { ...prev, positions: { ...prev.positions } };
          next.positions[symbol] = { ...next.positions[symbol], currentPrice: price };
          return next;
        });
      };

      const resetPortfolio = () => {
        const p = { cash: STARTING_CASH, positions: {} };
        const h = [];
        setPortfolio(p);
        setHistory(h);
        save(p, h);
      };

      if (loading) return null;

      return (
        <PortfolioContext.Provider value={{ portfolio, history, executeTrade, updatePrice, resetPortfolio }}>
          {children}
        </PortfolioContext.Provider>
      );
    }

    // STOCK CHART
    // ═══════════════════════════════════════════════════════
    function StockChart({ symbol }) {
      const chartRef = useRef(null);
      const chartInstance = useRef(null);
      const [resolution, setResolution] = useState("D");
      const [showIndicator, setShowIndicator] = useState(null);

      useEffect(() => {
        if (!chartRef.current || !symbol) return;
        loadChart();
        return () => { if (chartInstance.current) chartInstance.current.remove(); };
      }, [symbol, resolution]);

      const loadChart = async () => {
        if (chartInstance.current) chartInstance.current.remove();
        const container = chartRef.current;
        const chart = LightweightCharts.createChart(container, {
          width: container.clientWidth,
          height: 350,
          layout: { background: { type: 'solid', color: '#1a1d27' }, textColor: '#8b8fa3' },
          grid: { vertLines: { color: '#2e3348' }, horzLines: { color: '#2e3348' } },
          crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
          rightPriceScale: { borderColor: '#2e3348' },
          timeScale: { borderColor: '#2e3348', timeVisible: resolution !== 'D' && resolution !== 'W' },
        });
        chartInstance.current = chart;

        const candles = await getCandles(symbol, resolution);
        if (candles.length > 0) {
          const candleSeries = chart.addCandlestickSeries({
            upColor: '#00b894', downColor: '#e74c3c',
            borderUpColor: '#00b894', borderDownColor: '#e74c3c',
            wickUpColor: '#00b894', wickDownColor: '#e74c3c',
          });
          candleSeries.setData(candles.map(c => ({
            time: c.time,
            open: c.open, high: c.high, low: c.low, close: c.close
          })));

          // Add 20-period SMA
          if (candles.length >= 20) {
            const smaData = [];
            for (let i = 19; i < candles.length; i++) {
              const sum = candles.slice(i-19, i+1).reduce((s, c) => s + c.close, 0);
              smaData.push({ time: candles[i].time, value: sum / 20 });
            }
            const smaSeries = chart.addLineSeries({ color: '#74b9ff', lineWidth: 1 });
            smaSeries.setData(smaData);
          }

          // Volume
          const volumeSeries = chart.addHistogramSeries({
            priceFormat: { type: 'volume' },
            priceScaleId: '',
          });
          chart.priceScale('').applyOptions({
            scaleMargins: { top: 0.8, bottom: 0 },
          });
          volumeSeries.setData(candles.map(c => ({
            time: c.time,
            value: c.volume,
            color: c.close >= c.open ? 'rgba(0,184,148,0.3)' : 'rgba(231,76,60,0.3)'
          })));
        }
        chart.timeScale().fitContent();

        const resizeObserver = new ResizeObserver(() => {
          chart.applyOptions({ width: container.clientWidth });
        });
        resizeObserver.observe(container);
      };

      return (
        <div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <div className="chart-controls">
              {["5","15","60","D","W"].map(r => (
                <button key={r} className={`chart-btn ${resolution === r ? 'active' : ''}`}
                  onClick={() => setResolution(r)}>{r === "60" ? "1H" : r}</button>

            <div className="chart-controls">
              {["rsi","macd","moving_averages","volume"].map(ind => (
                <button key={ind} className="chart-btn" onClick={() => setShowIndicator(ind)}

          </div>
          <div ref={chartRef} id="chart-container" />

        </div>
      );
    }

    // ═══════════════════════════════════════════════════════
    // SEARCH BAR
    // ═══════════════════════════════════════════════════════
    function SearchBar({ onSelect }) {
      const [query, setQuery] = useState("");
      const [results, setResults] = useState([]);
      const [show, setShow] = useState(false);
      const timeoutRef = useRef(null);

      const handleChange = (val) => {
        setQuery(val);
        clearTimeout(timeoutRef.current);
        if (val.length < 1) { setResults([]); setShow(false); return; }
        timeoutRef.current = setTimeout(async () => {
          const r = await searchSymbols(val);
          setResults(r);
          setShow(r.length > 0);
        }, 300);
      };

      return (
        <div className="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input placeholder="Search stocks (e.g. AAPL, TSLA)..." value={query}
            onChange={e => handleChange(e.target.value)}
            onFocus={() => results.length && setShow(true)}
            onBlur={() => setTimeout(() => setShow(false), 200)} />
          {show && (
            <div className="search-results">
              {results.map(r => (
                <div key={r.symbol} className="search-result-item"
                  onClick={() => { onSelect(r.symbol, r.description); setQuery(""); setShow(false); }}>
                  <div>
                    <span className="symbol">{r.symbol}</span>
                    <div className="name">{r.description}</div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════
    // TRADE PANEL
    // ═══════════════════════════════════════════════════════
    function TradePanel({ symbol, quote }) {
      const { portfolio, history, executeTrade } = useContext(PortfolioContext);
      const addToast = useContext(ToastContext);
      const [side, setSide] = useState("buy");
      const [shares, setShares] = useState("");
      const [eduPopup, setEduPopup] = useState(null);
      const [pendingTrade, setPendingTrade] = useState(null);

      if (!symbol || !quote) return (
        <div className="card">
          <div className="card-header"><h3>Trade</h3></div>
          <div className="card-body">
            <div className="empty-state">
              <div className="emoji">{"\uD83D\uDD0D"}</div>
              <p>Search for a stock to start trading</p>
            </div>
          </div>
        </div>
      );

      const price = quote.c || 0;
      const numShares = parseInt(shares) || 0;
      const total = numShares * price;
      const position = portfolio.positions[symbol];
      const maxBuyShares = Math.floor(portfolio.cash / price);
      const maxSellShares = position?.shares || 0;

      const handleTrade = () => {
        if (numShares <= 0) return addToast("Enter a valid number of shares", "error");
        if (side === "buy" && total > portfolio.cash) return addToast("Insufficient funds", "error");
        if (side === "sell" && numShares > maxSellShares) return addToast("You don't own enough shares", "error");

        const trade = { symbol, shares: numShares, price, side };
        const rules = checkEducationalRules(portfolio, trade, history, quote);
        if (rules.length > 0) {
          setEduPopup(rules[0]);
          setPendingTrade(trade);
          return;
        }
        finalizeTrade(trade);
      };

      const finalizeTrade = (trade) => {
        executeTrade(trade.symbol, trade.shares, trade.price, trade.side);
        addToast(`${trade.side === "buy" ? "Bought" : "Sold"} ${trade.shares} shares of ${trade.symbol} at ${formatMoney(trade.price)}`, "success");
        setShares("");
        setEduPopup(null);
        setPendingTrade(null);
      };

      return (
        <div className="card">
          <div className="trade-tabs">
            <button className={`trade-tab ${side === "buy" ? "active-buy" : ""}`} onClick={() => setSide("buy")}>Buy</button>
            <button className={`trade-tab ${side === "sell" ? "active-sell" : ""}`} onClick={() => setSide("sell")}>Sell</button>
          </div>
          <div className="trade-form">
            <div className="trade-row">
              <label>Symbol</label>
              <strong>{symbol}</strong>
            </div>
            <div className="trade-row">
              <label>Price</label>
              <span>{formatMoney(price)}</span>
            </div>
            <div className="trade-row">
              <label>Shares</label>
              <input className="trade-input" type="number" min="1"
                max={side === "buy" ? maxBuyShares : maxSellShares}
                value={shares} onChange={e => setShares(e.target.value)}
                placeholder="0" />
            </div>
            <div style={{textAlign:'right',fontSize:12,color:'var(--text-dim)',marginBottom:8}}>
              Max: {side === "buy" ? maxBuyShares : maxSellShares} shares
            </div>
            <div className="trade-summary">
              <div className="trade-summary-row"><span>Estimated Total</span><span>{formatMoney(total)}</span></div>
              <div className="trade-summary-row"><span>Available Cash</span><span>{formatMoney(portfolio.cash)}</span></div>
              {side === "buy" && <div className="trade-summary-row"><span>After Trade</span><span>{formatMoney(portfolio.cash - total)}</span></div>}
            </div>
            <button className={`btn ${side === "buy" ? "btn-buy" : "btn-sell"}`} onClick={handleTrade}>
              {side === "buy" ? `Buy ${symbol}` : `Sell ${symbol}`}
            </button>
          </div>
          {eduPopup && (
            <EducationalPopup rule={eduPopup}
              onClose={() => { setEduPopup(null); setPendingTrade(null); }}
              onProceed={() => finalizeTrade(pendingTrade)} />
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════
    // WATCHLIST
    // ═══════════════════════════════════════════════════════
    function Watchlist({ onSelect, activeSymbol }) {
      const [items, setItems] = useState(() => {
        const saved = localStorage.getItem("watchlist");
        return saved ? JSON.parse(saved) : [
          { symbol: "AAPL", name: "Apple Inc" },
          { symbol: "MSFT", name: "Microsoft" },
          { symbol: "GOOGL", name: "Alphabet" },
          { symbol: "TSLA", name: "Tesla" },
          { symbol: "AMZN", name: "Amazon" },
        ];
      });
      const [quotes, setQuotes] = useState({});
      const [addSymbol, setAddSymbol] = useState("");

      useEffect(() => {
        localStorage.setItem("watchlist", JSON.stringify(items));
        items.forEach(async (item) => {
          const q = await getQuote(item.symbol);
          if (q) setQuotes(prev => ({ ...prev, [item.symbol]: q }));
        });
      }, [items]);

      const handleAdd = async () => {
        const sym = addSymbol.toUpperCase().trim();
        if (!sym || items.find(i => i.symbol === sym)) return;
        const results = await searchSymbols(sym);
        const match = results.find(r => r.symbol === sym) || results[0];
        if (match) {
          setItems(prev => [...prev, { symbol: match.symbol, name: match.description }]);
        } else {
          setItems(prev => [...prev, { symbol: sym, name: sym }]);
        }
        setAddSymbol("");
      };

      const handleRemove = (sym) => {
        setItems(prev => prev.filter(i => i.symbol !== sym));
      };

      return (
        <div className="card">
          <div className="card-header"><h3>Watchlist</h3></div>
          <div className="card-body">
            {items.map(item => {
              const q = quotes[item.symbol];
              const change = q ? (q.dp || ((q.c - q.pc) / q.pc * 100)) : 0;
              return (
                <div key={item.symbol} className="watchlist-item" onClick={() => onSelect(item.symbol, item.name)}>
                  <div>
                    <div className="watchlist-ticker">{item.symbol}</div>
                    <div className="watchlist-name">{item.name}</div>
                  </div>
                  <div className="watchlist-price">
                    <div className="price">{q ? formatMoney(q.c) : "..."}</div>
                    <div className={`change ${change >= 0 ? 'pnl-positive' : 'pnl-negative'}`}>
                      {formatPct(change)}
                    </div>
                  </div>
                </div>
              );
            })}
            <div className="watchlist-add">
              <input placeholder="Add symbol..." value={addSymbol}
                onChange={e => setAddSymbol(e.target.value)}
                onKeyDown={e => e.key === "Enter" && handleAdd()} />
              <button className="btn btn-outline btn-sm" onClick={handleAdd}>+</button>
            </div>
          </div>
        </div>
      );
    }

    // DASHBOARD PAGE
    // ═══════════════════════════════════════════════════════
    function DashboardPage() {
      const { portfolio, history, updatePrice } = useContext(PortfolioContext);
      const [selectedSymbol, setSelectedSymbol] = useState(null);
      const [selectedName, setSelectedName] = useState("");
      const [quote, setQuote] = useState(null);

      const handleSelect = async (symbol, name) => {
        setSelectedSymbol(symbol);
        setSelectedName(name || symbol);
        const q = await getQuote(symbol);
        setQuote(q);
        if (q && portfolio.positions[symbol]) {
          updatePrice(symbol, q.c);
        }
      };

      const totalPositionValue = Object.values(portfolio.positions).reduce((s, p) => s + p.shares * p.currentPrice, 0);
      const totalValue = portfolio.cash + totalPositionValue;
      const totalPnL = totalValue - STARTING_CASH;
      const totalPnLPct = ((totalValue / STARTING_CASH) - 1) * 100;

      return (
        <div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
            <h2>Dashboard</h2>
            <div style={{width:360}}><SearchBar onSelect={handleSelect} /></div>
          </div>

          <div className="stats-grid">
            <div className="stat-card">
              <div className="stat-label">Total Portfolio Value</div>
              <div className="stat-value">{formatMoney(totalValue)}</div>
              <div className={`stat-change ${totalPnL >= 0 ? 'up' : 'down'}`}>
                {formatPct(totalPnLPct)} ({formatMoney(totalPnL)})
              </div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Cash Available</div>
              <div className="stat-value">{formatMoney(portfolio.cash)}</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Positions Value</div>
              <div className="stat-value">{formatMoney(totalPositionValue)}</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Total Trades</div>
              <div className="stat-value">{history.length}</div>
            </div>
          </div>

          <div className="content-grid">
            <div>
              <div className="card" style={{marginBottom:20}}>
                <div className="card-header">
                  <h3>{selectedSymbol ? `${selectedSymbol} — ${selectedName}` : "Select a Stock"}</h3>
                  {quote && (
                    <div style={{display:'flex',alignItems:'center',gap:12}}>
                      <span style={{fontSize:20,fontWeight:700}}>{formatMoney(quote.c)}</span>
                      <span className={quote.dp >= 0 ? 'pnl-positive' : 'pnl-negative'} style={{fontSize:14}}>
                        {formatPct(quote.dp || 0)}
                      </span>
                    </div>
                  )}
                </div>
                <div className="card-body">
                  {selectedSymbol ? <StockChart symbol={selectedSymbol} />
                    : <div className="empty-state"><div className="emoji">{"\uD83D\uDCC8"}</div><p>Search or select from your watchlist</p></div>}

              </div>
              <Watchlist onSelect={handleSelect} activeSymbol={selectedSymbol} />
            </div>
            <div>
              <TradePanel symbol={selectedSymbol} quote={quote} />
            </div>
          </div>
        </div>
      );
    }

    function PortfolioPage() {
      const { portfolio, history, resetPortfolio } = useContext(PortfolioContext);

      const positions = Object.entries(portfolio.positions);
      const totalPositionValue = positions.reduce((s, [, p]) => s + p.shares * p.currentPrice, 0);
      const totalValue = portfolio.cash + totalPositionValue;

      return (
        <div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
            <h2>Portfolio</h2>
            <button className="btn btn-outline btn-sm" onClick={() => { resetPortfolio(); addToast("Portfolio reset to $100,000", "info"); }}>
              Reset Portfolio
            </button>
          </div>

          <div className="stats-grid">
            <div className="stat-card">
              <div className="stat-label">Total Value</div>
              <div className="stat-value">{formatMoney(totalValue)}</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Cash</div>
              <div className="stat-value">{formatMoney(portfolio.cash)}</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Invested</div>
              <div className="stat-value">{formatMoney(totalPositionValue)}</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">P&L</div>
              <div className="stat-value" style={{color: totalValue >= STARTING_CASH ? 'var(--green)' : 'var(--red)'}}>
                {formatMoney(totalValue - STARTING_CASH)}
              </div>
            </div>
          </div>

          <div className="card" style={{marginBottom:20}}>
            <div className="card-header"><h3>Open Positions</h3></div>
            <div className="card-body" style={{padding:0,overflowX:'auto'}}>
              {positions.length === 0 ? (
                <div className="empty-state"><div className="emoji">{"\uD83D\uDCBC"}</div><p>No open positions. Start trading!</p></div>
              ) : (
                <table className="positions-table">
                  <thead><tr><th>Symbol</th><th>Shares</th><th>Avg Cost</th><th>Current</th><th>Value</th><th>P&L</th><th>P&L %</th></tr></thead>
                  <tbody>
                    {positions.map(([sym, pos]) => {
                      const pnl = (pos.currentPrice - pos.avgCost) * pos.shares;
                      const pnlPct = ((pos.currentPrice / pos.avgCost) - 1) * 100;
                      return (
                        <tr key={sym}>
                          <td className="ticker">{sym}</td>
                          <td>{pos.shares}</td>
                          <td>{formatMoney(pos.avgCost)}</td>
                          <td>{formatMoney(pos.currentPrice)}</td>
                          <td>{formatMoney(pos.shares * pos.currentPrice)}</td>
                          <td className={pnl >= 0 ? 'pnl-positive' : 'pnl-negative'}>{formatMoney(pnl)}</td>
                          <td className={pnlPct >= 0 ? 'pnl-positive' : 'pnl-negative'}>{formatPct(pnlPct)}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              )}
            </div>
          </div>

          <div className="card">
            <div className="card-header"><h3>Trade History</h3></div>
            <div className="card-body">
              {history.length === 0 ? (
                <div className="empty-state"><p>No trades yet</p></div>
              ) : (
                [...history].reverse().slice(0, 50).map((h, i) => (
                  <div key={i} className="history-item">
                    <div style={{display:'flex',alignItems:'center',gap:10}}>
                      <span className={`history-badge ${h.side}`}>{h.side}</span>

                      <span style={{color:'var(--text-dim)'}}>{h.shares} shares @ {formatMoney(h.price)}</span>

                    <div style={{color:'var(--text-dim)',fontSize:12}}>
                      {new Date(h.timestamp).toLocaleString()}

                ))
              )}
            </div>
          </div>
        </div>
      );

        {
          icon: "\u26A0\uFE0F", title: "Pattern Day Trader Rule", level: "beginner",
          content: "The PDT rule is a FINRA regulation that applies to margin accounts. If you make 4 or more day trades (buy and sell the same stock on the same day) within 5 business days, and these trades represent more than 6% of your total trading activity, your account gets flagged.\n\nOnce flagged, you need to maintain at least $25,000 in your account to continue day trading. If your balance drops below $25k, you'll be restricted to closing trades only for 90 days.\n\nStrategies to manage this: Hold positions overnight, use a cash account (no PDT but slower settlement), or ensure your balance stays above $25k."
        },
        {
          icon: "\uD83D\uDEE1\uFE0F", title: "Risk Management", level: "intermediate",

          icon: "\uD83D\uDCC8", title: "Technical Analysis Basics", level: "intermediate",

      portfolio: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>,
      learn: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
      logout: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
    };

    // ═══════════════════════════════════════════════════════
    // MAIN APP
    // ═══════════════════════════════════════════════════════
    function AppShell() {
      const { user, logout } = useContext(AuthContext);
      const [page, setPage] = useState("dashboard");

      const needsConfig = FIREBASE_CONFIG.apiKey === "YOUR_FIREBASE_API_KEY" || FINNHUB_API_KEY === "YOUR_FINNHUB_API_KEY";

      return (
        <div className="app-layout">
          <div className="sidebar">
            <div className="sidebar-brand">
              <h2>{"\uD83D\uDCC8"} PaperTrader</h2>
              <span>Learn to trade, risk-free</span>
            </div>
            <div className="sidebar-nav">
              <div className={`nav-item ${page === "dashboard" ? "active" : ""}`} onClick={() => setPage("dashboard")}>
                {icons.dashboard} Dashboard
              </div>
              <div className={`nav-item ${page === "portfolio" ? "active" : ""}`} onClick={() => setPage("portfolio")}>
                {icons.portfolio} Portfolio
              </div>
              <div className={`nav-item ${page === "learn" ? "active" : ""}`} onClick={() => setPage("learn")}>
                {icons.learn} Learn
              </div>
            </div>
            <div className="sidebar-footer">
              <div className="user-info">
                <div className="user-avatar">{(user.displayName || user.email || "U")[0].toUpperCase()}</div>
                <div>
                  <div className="user-name">{user.displayName || "Trader"}</div>
                  <div className="user-email">{user.email}</div>
                </div>
              </div>
              <button className="btn btn-outline btn-sm" style={{width:'100%',justifyContent:'center'}} onClick={logout}>
                {icons.logout} Sign Out
              </button>
            </div>
          </div>
          <div className="main-content">
            {needsConfig && (
              <div className="config-banner">
                Running in demo mode — add your Firebase & Finnhub API keys in index.html to enable real data and authentication
              </div>
            )}
            {page === "dashboard" && <DashboardPage />}
            {page === "portfolio" && <PortfolioPage />}
            {page === "learn" && <LearnPage />}
          </div>
        </div>
      );
    }

    function App() {
      return (
        <ToastProvider>
          <AuthProvider>
            <AuthContext.Consumer>
              {({ user }) => user ? (
                <PortfolioProvider><AppShell /></PortfolioProvider>
              ) : (
                <LoginPage />
              )}
            </AuthContext.Consumer>
          </AuthProvider>
        </ToastProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
